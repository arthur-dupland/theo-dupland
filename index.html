<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COSMOS — Mission Spatiale Interactive</title>
  <style>
    :root {
      --accent: #4fc3f7;
      --glow:   #4fc3f7;
      --bg:     #020818;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #e0f0ff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ——— ETOILES ——— */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--d,3s) var(--delay,0s) infinite alternate ease-in-out;
    }
    @keyframes twinkle {
      from { opacity:.1; transform:scale(1); }
      to   { opacity:.9; transform:scale(1.4); }
    }
    #ambient { position:fixed; inset:0; pointer-events:none; z-index:1; transition:background 1.5s ease; }

    /* ——— ECRANS GENERAUX ——— */
    .screen {
      display: none; position: relative; z-index: 10;
      width: 100%; max-width: 700px;
      animation: fadeUp .7s ease;
    }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ——— WELCOME ——— */
    #screen-welcome {
      align-items: center; text-align: center; padding: 2rem 1rem;
      height: 100vh; justify-content: center;
    }
    .rocket-anim { font-size:4rem; animation: float 3s ease-in-out infinite; margin-bottom:1rem; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    #screen-welcome h1 {
      font-size:3.2rem; letter-spacing:.3em; color:var(--accent);
      text-shadow:0 0 40px var(--glow),0 0 80px var(--glow); margin-bottom:.3rem;
    }
    .subtitle { font-size:.9rem; letter-spacing:.2em; color:#7ecfff; opacity:.8; margin-bottom:2.5rem; }
    .form-group { display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .form-group label { font-size:1rem; color:#a0d8ef; }
    .cosmos-input {
      background:rgba(79,195,247,.1); border:1px solid rgba(79,195,247,.4);
      border-radius:12px; color:white; font-size:1.2rem; padding:.7rem 1.5rem;
      text-align:center; outline:none; width:220px; transition:border-color .3s,box-shadow .3s;
    }
    .cosmos-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(79,195,247,.3); }
    .cosmos-input::placeholder { color:rgba(255,255,255,.25); }
    .btn-primary {
      background:linear-gradient(135deg,#1565c0,#0288d1); border:none;
      border-radius:50px; color:white; cursor:pointer; font-size:.95rem;
      font-weight:600; letter-spacing:.1em; padding:.8rem 2.2rem;
      box-shadow:0 0 25px rgba(79,195,247,.4); transition:transform .2s,box-shadow .2s;
    }
    .btn-primary:hover { transform:scale(1.05); box-shadow:0 0 40px rgba(79,195,247,.6); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* ——— RETURNING ——— */
    #screen-returning {
      align-items: center; text-align: center; padding: 2rem 1rem;
      height: 100vh; justify-content: center; gap: 1.5rem;
    }
    #screen-returning h2 { font-size:1.8rem; color:var(--accent); }
    #screen-returning .cliff {
      font-size:1rem; color:#b0d8ff; font-style:italic;
      max-width:480px; line-height:1.7;
      background:rgba(79,195,247,.07); border-left:3px solid var(--accent);
      padding:1rem 1.2rem; border-radius:0 12px 12px 0; text-align:left;
    }
    .ret-btns { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .btn-ghost {
      background:rgba(79,195,247,.1); border:1px solid rgba(79,195,247,.35);
      border-radius:50px; color:#a0d8ef; cursor:pointer; font-size:.9rem;
      padding:.65rem 1.6rem; transition:all .2s;
    }
    .btn-ghost:hover { background:rgba(79,195,247,.2); color:white; }

    /* ——— DESTINATION SELECT ——— */
    #screen-destination {
      height: 100vh; padding: 1.5rem 1rem; overflow-y: auto; gap: 1.2rem;
      scrollbar-width: thin; scrollbar-color: rgba(79,195,247,.3) transparent;
    }
    #screen-destination h2 { color:var(--accent); font-size:1.4rem; letter-spacing:.1em; text-align:center; }
    .dest-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.8rem; }
    .dest-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(79,195,247,.2);
      border-radius:16px; padding:1.1rem; cursor:pointer; transition:all .25s;
      position:relative; overflow:hidden;
    }
    .dest-card:hover:not(.locked) { background:rgba(79,195,247,.1); border-color:rgba(79,195,247,.5); transform:translateY(-2px); }
    .dest-card.locked { opacity:.4; cursor:not-allowed; filter:grayscale(.6); }
    .dest-card.current { border-color:var(--accent); box-shadow:0 0 20px rgba(79,195,247,.2); }
    .dest-card .dest-emoji { font-size:1.8rem; margin-bottom:.4rem; }
    .dest-card .dest-name { font-size:.95rem; font-weight:700; color:#e0f0ff; }
    .dest-card .dest-progress {
      font-size:.72rem; color:#7ecfff; margin-top:.3rem;
      display:flex; align-items:center; gap:.5rem;
    }
    .progress-bar {
      flex:1; height:4px; background:rgba(255,255,255,.1); border-radius:4px; overflow:hidden;
    }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width .5s ease; }
    .dest-card .lock-icon { position:absolute; top:.7rem; right:.7rem; font-size:.9rem; }
    .dest-card .unlock-hint { font-size:.65rem; color:rgba(255,255,255,.35); margin-top:.3rem; }
    .badge-row { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
    .badge {
      font-size:.65rem; padding:.15rem .5rem; background:rgba(255,193,7,.15);
      border:1px solid rgba(255,193,7,.3); border-radius:20px; color:#ffd54f;
    }

    /* ——— CHAT ——— */
    #screen-chat { height:100vh; padding:0 .5rem; }
    #mission-bar {
      display:flex; align-items:center; gap:.7rem;
      padding:.65rem .8rem; background:rgba(0,0,0,.55);
      border-bottom:1px solid rgba(79,195,247,.15); flex-shrink:0;
    }
    #mission-bar .logo { font-size:1.2rem; font-weight:800; color:var(--accent); letter-spacing:.15em; text-shadow:0 0 15px var(--glow); }
    #mission-bar .sep { flex:1; }
    #led-indicator {
      width:12px; height:12px; border-radius:50%;
      background:var(--glow); box-shadow:0 0 8px var(--glow),0 0 16px var(--glow);
      transition:background .8s,box-shadow .8s; flex-shrink:0;
    }
    #mission-text { font-size:.7rem; letter-spacing:.12em; color:#a0d8ef; font-weight:600; }
    #stage-badge {
      font-size:.65rem; padding:.15rem .5rem;
      background:rgba(79,195,247,.15); border:1px solid rgba(79,195,247,.3);
      border-radius:20px; color:var(--accent); white-space:nowrap;
    }
    .top-btn {
      background:none; border:1px solid rgba(255,255,255,.15); border-radius:8px;
      color:rgba(255,255,255,.4); cursor:pointer; font-size:.65rem; padding:.25rem .55rem;
      transition:all .2s;
    }
    .top-btn:hover { color:white; border-color:rgba(255,255,255,.5); }

    #messages {
      flex:1; overflow-y:auto; padding:.8rem .3rem;
      display:flex; flex-direction:column; gap:.9rem;
      scrollbar-width:thin; scrollbar-color:rgba(79,195,247,.25) transparent;
    }
    #messages::-webkit-scrollbar { width:3px; }
    #messages::-webkit-scrollbar-thumb { background:rgba(79,195,247,.25); border-radius:3px; }

    .msg {
      max-width:87%; border-radius:18px; padding:.8rem 1rem;
      font-size:.93rem; line-height:1.55; animation:msgIn .3s ease;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .msg.cosmos {
      align-self:flex-start;
      background:rgba(21,101,192,.22); border:1px solid rgba(79,195,247,.22);
      border-bottom-left-radius:4px;
    }
    .msg.cosmos .sender { font-size:.65rem; letter-spacing:.14em; color:var(--accent); font-weight:700; margin-bottom:.3rem; }
    .msg.user {
      align-self:flex-end; background:rgba(2,136,209,.28);
      border:1px solid rgba(79,195,247,.18); border-bottom-right-radius:4px;
    }
    .msg.system-msg {
      align-self:center; background:rgba(255,193,7,.1);
      border:1px solid rgba(255,193,7,.25); border-radius:12px;
      font-size:.78rem; color:#ffd54f; text-align:center; max-width:90%; padding:.6rem 1rem;
    }

    #typing { display:none; align-self:flex-start; padding:.65rem .9rem;
      background:rgba(21,101,192,.18); border:1px solid rgba(79,195,247,.18);
      border-radius:18px; border-bottom-left-radius:4px; gap:4px; align-items:center; }
    #typing.visible { display:flex; }
    .dot {
      width:6px; height:6px; border-radius:50%; background:var(--accent);
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce {
      0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1}
    }

    #input-area {
      display:flex; align-items:center; gap:.5rem;
      padding:.7rem .3rem; border-top:1px solid rgba(79,195,247,.12); flex-shrink:0;
    }
    #chat-input {
      flex:1; background:rgba(79,195,247,.07); border:1px solid rgba(79,195,247,.22);
      border-radius:50px; color:white; font-size:.92rem; padding:.6rem 1.1rem;
      outline:none; transition:border-color .3s,box-shadow .3s;
    }
    #chat-input:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(79,195,247,.18); }
    #chat-input::placeholder { color:rgba(255,255,255,.22); }
    #btn-send {
      background:linear-gradient(135deg,#1565c0,#0288d1); border:none; border-radius:50%;
      color:white; cursor:pointer; font-size:1rem; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 12px rgba(79,195,247,.3); transition:transform .2s,box-shadow .2s; flex-shrink:0;
    }
    #btn-send:hover { transform:scale(1.1); box-shadow:0 0 22px rgba(79,195,247,.5); }
    #btn-send:disabled { opacity:.35; cursor:not-allowed; transform:none; }
    #btn-voice {
      background:rgba(79,195,247,.08); border:2px solid rgba(79,195,247,.28); border-radius:50%;
      color:var(--accent); cursor:pointer; font-size:1.1rem; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0;
    }
    #btn-voice:hover { background:rgba(79,195,247,.18); }
    #btn-voice.listening { background:rgba(244,67,54,.2); border-color:#f44336; color:#f44336; animation:pulse-mic 1s infinite; }
    @keyframes pulse-mic {
      0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.4)} 50%{box-shadow:0 0 0 10px rgba(244,67,54,0)}
    }

    /* ——— STAGE COMPLETE BANNER ——— */
    #stage-banner {
      display:none; position:fixed; top:0; left:0; right:0; z-index:100;
      background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(79,195,247,.15));
      border-bottom:1px solid rgba(0,255,136,.4); padding:.8rem 1rem;
      text-align:center; font-size:.85rem; color:#00ff88; font-weight:600;
      letter-spacing:.05em; animation:slideDown .5s ease;
    }
    @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

    /* ——— TOAST ——— */
    #toast {
      display:none; position:fixed; bottom:5rem; left:50%; transform:translateX(-50%);
      background:rgba(244,67,54,.9); color:white; padding:.55rem 1.1rem;
      border-radius:20px; font-size:.82rem; z-index:200; animation:fadeUp .3s ease;
    }

    @media(max-width:500px) {
      .dest-grid { grid-template-columns:1fr; }
      #screen-welcome h1 { font-size:2.4rem; }
      .msg { font-size:.87rem; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="ambient"></div>

<!-- ========= ECRAN ACCUEIL (premiere fois) ========= -->
<div id="screen-welcome" class="screen">
  <span class="rocket-anim">🚀</span>
  <h1>COSMOS</h1>
  <p class="subtitle">MISSION SPATIALE INTERACTIVE</p>
  <form class="form-group" onsubmit="onWelcomeSubmit(event)">
    <label for="input-prenom">Ton nom, commandant ?</label>
    <input id="input-prenom" class="cosmos-input" type="text" placeholder="Arthur, Theo..." autocomplete="off" required maxlength="20">
    <button class="btn-primary" type="submit">🛸 Lancer la mission</button>
  </form>
</div>

<!-- ========= ECRAN RETOUR (sessions suivantes) ========= -->
<div id="screen-returning" class="screen">
  <div style="font-size:3rem">👨‍🚀</div>
  <h2 id="ret-title">Bon retour !</h2>
  <div id="ret-cliff" class="cliff"></div>
  <div class="ret-btns">
    <button class="btn-primary" onclick="continueLastMission()">▶ Continuer la mission</button>
    <button class="btn-ghost" onclick="showDestinations()">🗺 Changer de destination</button>
    <button class="btn-ghost" onclick="resetAll()">↺ Nouveau commandant</button>
  </div>
</div>

<!-- ========= DESTINATIONS ========= -->
<div id="screen-destination" class="screen">
  <h2>🗺 Choisir une destination</h2>
  <div class="dest-grid" id="dest-grid"></div>
  <div style="height:1rem"></div>
</div>

<!-- ========= CHAT ========= -->
<div id="screen-chat" class="screen">
  <div id="mission-bar">
    <span class="logo">COSMOS</span>
    <span class="sep"></span>
    <div id="led-indicator"></div>
    <span id="mission-text">EN ATTENTE</span>
    <span id="stage-badge"></span>
    <button class="top-btn" onclick="showDestinations()" title="Changer de destination">🗺</button>
    <button class="top-btn" onclick="restartCurrentMission()" title="Relancer la mission">↺</button>
    <button class="top-btn" id="btn-mute" onclick="toggleMute()" title="Son on/off">🔊</button>
  </div>

  <div id="messages">
    <div id="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div id="input-area">
    <button id="btn-voice" onclick="toggleVoice()" title="Parler">🎙</button>
    <input id="chat-input" type="text" placeholder="Tape ta reponse, commandant..."
      autocomplete="off" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    <button id="btn-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Stage complete banner -->
<div id="stage-banner"></div>
<!-- Toast -->
<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

firebase.initializeApp({

  authDomain:       'cosmos-c6896.firebaseapp.com',
  projectId:        'cosmos-c6896',
  storageBucket:    'cosmos-c6896.firebasestorage.app',

});
const db = firebase.firestore();

// ====================================================
// DESTINATIONS + ETAPES PEDAGOGIQUES
// ====================================================
const DEST = {
  lune: {
    id:'lune', name:'Lune', emoji:'🌕', led:'#b0d8ff',
    ambient:'radial-gradient(ellipse at center,rgba(176,216,255,.09) 0%,transparent 70%)',
    unlocked_by: [],
    stages: [
      { name:'Artemis IV — 3 jours dans l\'Orion', obj:'Comprendre le voyage Terre-Lune et pourquoi Artemis IV est la mission historique',
        hint:'Artemis II (avril 2026) : 4 astronautes, record humain 406 771 km de la Terre, pas d\'atterrissage — validation du vaisseau Orion. Artemis IV (2028) = PREMIER atterrissage depuis Apollo 17 en 1972. Voyage : 3 jours dans la capsule Orion (grande comme un salon de 4 m2 pour 4 personnes). SLS = fusee de 98m. Starship HLS (SpaceX, 50m de haut) est positionne en orbite lunaire EN AVANCE, avant l\'arrivee d\'Orion. Delai de communication Terre-Lune : 1,3 seconde (quasi instantane compare a Mars). Gravite lunaire : 1/6 de la Terre — si tu peses 30 kg, tu peses 5 kg sur la Lune.',
        amorce:'Jour 2 dans l\'Orion. La Lune remplit maintenant tout le hublot — elle est enorme, grise, couverte de crateres. Quatre astronautes dans un espace de 4 m2 depuis 48 heures. Dans 24h vous vous arrimerez au Starship HLS qui vous attend en orbite. Qu\'est-ce qui t\'etonne le plus : que 4 personnes vivent dans si peu de place, ou que le Starship soit deja la sans personne dedans ?' },
      { name:'Atterrissage a Shackleton', obj:'Comprendre comment Starship HLS atterrit et pourquoi le pole sud de la Lune',
        hint:'Cratere Shackleton (pole sud lunaire) : 21 km de diametre, jamais de soleil depuis 3 milliards d\'ans au fond (-240 degC), mais le bord est eclaire 89% du temps. Starship HLS : 50m de haut sur la Lune (immeuble de 15 etages), propulsion methane-oxygene. 2 astronautes descendent dans le Starship, 2 restent dans l\'Orion en orbite. Au toucher : le regolithe se souleve en fontaine silencieuse (pas d\'air = pas d\'onde de souffle, juste des particules qui jaillissent). Ciel noir meme a midi — sans atmosphere, la lumiere ne se diffuse pas. Chaque pas enfonce de 2 cm dans le sol. Pression du suit : 0,3 atm O2 pur.',
        amorce:'Vous descendez dans le Starship HLS. Par le hublot, la Lune grossit, grossit... et soudain le moteur rugit, les jambes d\'atterrissage se deployent. Contact ! Un nuage de poussiere silencieuse tourbillonne autour de vous. Dehors : ciel noir, Terre qui brille comme une bille bleue, sol gris comme du ciment. Ton premier pas dehors — pourquoi le ciel est-il noir meme si le soleil brille juste a cote de toi ?' },
      { name:'Le regolithe — l\'ennemi invisible', obj:'Comprendre pourquoi la poussiere lunaire est le plus grand danger de la base',
        hint:'Regolithe = fragments de verre microscopiques (meteorites ont pulverise la roche pendant 4 milliards d\'ans). Electrostatique : se charge comme un ballon frotté sur un pull, colle a tout. Taille : 10 a 100 microns, 20x plus fin que la farine. Apollo : combinaisons raidies en 3 EVAs, joints de genou bloques, Schmitt (Apollo 17) a les poumons irrites apres 3h dehors. AxEMU (nouveau suit NASA) : 14 couches, joints rotoïdes, visiere a rechargement electrostatique qui repousse la poussiere. Un seul grain dans le joint de genou peut bloquer la flexion. Impossible de se laver — 1 litre d\'eau par astronaute par jour.',
        amorce:'Premiere sortie EVA. Cinq minutes dehors et ta visiere est deja couverte d\'une fine couche grise qui ne tombe pas. Tu passes le gant dessus : elle s\'etale. Tu tournes le bras : le joint de coude est deja moins souple. Ton equipiere dit : "Attention aux genoux." Pourquoi le joint de genou est-il le premier a lacher face au regolithe ?' },
      { name:'Fabriquer l\'air et l\'eau', obj:'Comprendre l\'ISRU : tirer l\'oxygene du sol et l\'eau de la glace de Shackleton',
        hint:'Regolithe = 40 a 45% d\'oxygene emprisonne dans les mineraux (oxydes de fer, aluminium, titane). Extraction : electrolyse en sel fondu a 900 degC libere O2 pur. Residus = metaux reutilisables. Shackleton : 3 milliards de tonnes de glace detectees par sonde LCROSS (2009). Glace -> H2O electrolysee -> H2 (carburant de fusee) + O2 (air a respirer). Systeme ECLSS (ISS) : 98% de chaque goutte d\'eau recuperee — sueur, haleine ET urine retraitee en eau potable. 1 kg de regolithe peut produire 630g d\'oxygene. Ce que les astronautes respirent vient litteralement du sol sous leurs pieds.',
        amorce:'Ton electrolyseur tourne depuis 3 jours. Il chauffe du regolithe a 900 degres et en extrait de l\'oxygene pur. A cote, un autre module recycle ta sueur et... ta propre urine en eau potable. C\'est tellement efficace que 98% revient dans ton gobelet. Vrai ou faux : sur la base lunaire tu respires du sol et tu bois de ta transpiration ?' },
      { name:'Vivre sur la Lune', obj:'Comprendre la vie quotidienne : manger, dormir, aller aux toilettes en 1/6 de gravite',
        hint:'Toilettes UWMS (Universal Waste Management System) : aspiration comme un aspirateur, ceinture de maintien pour ne pas flotter. Douche impossible (manque d\'eau) : shampoing sec, lingettes. Nourriture : surtout lyophilisee (eau ajoutee), quelques aliments frais au debut. Sommeil : sac de couchage fixe au mur, 8h de sommeil obligatoire. Exercise : 2h par jour obligatoire (velo + musculation) meme en gravite 1/6 — les muscles s\'atrophient quand meme. Lever de soleil : au pole sud le soleil reste presque fixe a l\'horizon, pas de cycles jour/nuit normaux. Fenetre de communication avec la Terre quasi permanente (delai 1,3s).',
        amorce:'Premier matin sur la Lune. Tu dois aller aux toilettes. C\'est une experience. Ensuite : shampoing sec (pas d\'eau), nourriture lyophilisee reconstituee, et... 2 heures de velo. Obligatoire. Meme ici avec 1/6 de gravite. Pourquoi les astronautes font-ils du sport tous les jours meme sur la Lune, alors qu\'ils sont moins lourds qu\'un chat ?' },
      { name:'La nuit de 336 heures', obj:'Comprendre la nuit lunaire et pourquoi le nucleaire est la seule vraie solution energetique',

// ====================================================
// ETAT LOCAL (+ localStorage)
// ====================================================
const SAVE_KEY = 'cosmos_v2';
let state = null;
let groqKey = '';
let conversation = [];
let isSpeaking = false;
let isListening = false;
let recognition = null;
let currentDestId = 'lune';
let saving = false;

// ── Suivi narratif par session ──
let urgencyStatus     = 'AUCUNE';  // 'AUCUNE' | 'OUVERTE' | 'RÉSOLUE'
let urgencyTurns      = 0;         // nombre d'échanges depuis que l'urgence est ouverte
let usedQuestionForms = [];        // formes de questions déjà utilisées dans l'étape

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState() {
  if (saving) return;
  saving = true;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) {}
  saving = false;
}

function initNewState(prenom) {
  const dests = {};
  Object.keys(DEST).forEach(id => {
    dests[id] = {
      unlocked: DEST[id].unlocked_by.length === 0,
      completed: false,
      current_stage: 0,
      stages_done: [],
      stage_summaries: {},
      cliff_hanger: ''
    };
  });
  return {
    version: '2.0',
    prenom,
    created_at: new Date().toISOString().slice(0,10),
    last_session: new Date().toISOString().slice(0,10),
    total_sessions: 0,
    last_destination: 'lune',
    badges: [],
    destinations: dests
  };
}

function checkUnlocks() {
  Object.entries(DEST).forEach(([id, dest]) => {
    if (state.destinations[id].unlocked) return;
    const allDone = dest.unlocked_by.every(dep => state.destinations[dep].completed);
    if (allDone) {
      state.destinations[id].unlocked = true;
      saveState();
    }
  });
}

// ETOILES

(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');

    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:'+(Math.random()*4)+'s';
    c.appendChild(s);
  }
})();

// ====================================================
// INIT
// ====================================================
window.addEventListener('DOMContentLoaded', () => {
  state = loadState();
  if (state) {
    // Joueur connu -> ecran de retour
    checkUnlocks();
    state.total_sessions++;
    state.last_session = new Date().toISOString().slice(0,10);
    saveState();
    showReturning();
  } else {
    showScreen('welcome');
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ====================================================
// WELCOME
// ====================================================
async function onWelcomeSubmit(e) {
  e.preventDefault();
  const p = document.getElementById('input-prenom').value.trim();
  if (!p) return;
  state = initNewState(p);
  state.total_sessions = 1;
  saveState();
  await fetchGroqKey();
  currentDestId = 'lune';
  state.last_destination = 'lune';
  saveState();
  showScreen('chat');
  startMission(true);
}

// ====================================================
// RETURNING
// ====================================================
function showReturning() {
  const d = state.destinations[state.last_destination];
  const dest = DEST[state.last_destination];
  document.getElementById('ret-title').textContent = 'Bon retour, commandant ' + state.prenom + ' !';
  let cliff = 'Mission en cours...';
  if (d && dest) {
    const si = Math.min(d.current_stage, dest.stages.length - 1);
    const sname = (dest.stages[si] || {}).name || '';
    cliff = d.cliff_hanger || ('Mission ' + dest.name + ' — etape ' + (d.current_stage + 1) + '/' + dest.stages.length + (sname ? ' : ' + sname : ''));
  }
  document.getElementById('ret-cliff').textContent = cliff;
  showScreen('returning');
}

async function continueLastMission() {
  currentDestId = state.last_destination;
  await fetchGroqKey();
  showScreen('chat');
  startMission(false);
}

// ====================================================
// DESTINATIONS
// ====================================================
function toggleMute() {
  const muted = SoundEngine.toggle();
  document.getElementById('btn-mute').textContent = muted ? '🔇' : '🔊';
}

function showDestinations() {
  SoundEngine.stop();
  renderDestGrid();
  showScreen('destination');
}

function renderDestGrid() {
  const grid = document.getElementById('dest-grid');
  grid.innerHTML = '';
  Object.values(DEST).forEach(dest => {
    const ds = state.destinations[dest.id];
    const stagesTotal = dest.stages.length;
    const stagesDone = ds.stages_done.length;
    const pct = Math.round(stagesDone / stagesTotal * 100);
    const isCurrent = dest.id === currentDestId;
    const card = document.createElement('div');
    card.className = 'dest-card' + (ds.unlocked ? '' : ' locked') + (isCurrent ? ' current' : '');
    if (!ds.unlocked) {
      const deps = DEST[dest.id].unlocked_by.map(d => DEST[d].name).join(' + ');
      card.innerHTML = `
        <span class="lock-icon">🔒</span>
        <div class="dest-emoji">${dest.emoji}</div>
        <div class="dest-name">${dest.name}</div>
        <div class="unlock-hint">Terminer ${deps} pour debloquer</div>`;
    } else {
      card.innerHTML = `
        <div class="dest-emoji">${dest.emoji}</div>
        <div class="dest-name">${dest.name}${ds.completed ? ' ✓' : ''}</div>
        <div class="dest-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          ${stagesDone}/${stagesTotal}
        </div>`;
      card.onclick = () => selectDestination(dest.id);
    }
    grid.appendChild(card);
  });
}

async function selectDestination(id) {
  currentDestId = id;
  state.last_destination = id;
  saveState();
  SoundEngine.unlock(); // débloquer AudioContext pendant le geste utilisateur
  SoundEngine.stop();
  await fetchGroqKey();
  clearChat();
  showScreen('chat');
  const ds = state.destinations[id];
  const isNew = ds.cliff_hanger === '';
  startMission(isNew);
}

// ====================================================
// SYSTEM PROMPT
// ====================================================
function buildSystemPrompt() {
  const dest = DEST[currentDestId];
  if (!dest) return 'Tu es COSMOS, copilote spatial. La mission est en cours de chargement.';
  const ds   = state.destinations[currentDestId];
  const stageIdx = Math.min(ds.current_stage, dest.stages.length - 1);
  const stage = dest.stages[stageIdx] || dest.stages[0];
  const totalStages = dest.stages.length;

  // Resumes des etapes precedentes
  const doneStr = Object.entries(ds.stage_summaries)
    .map(([k, v]) => { const s = dest.stages[parseInt(k)]; return s ? `Etape ${parseInt(k)+1} (${s.name}) : ${v}` : null; })
    .filter(Boolean)
    .join('\n') || 'Aucune etape terminee encore.';

  // Context de retour
  const retCtx = ds.cliff_hanger
    ? `REPRISE : ${state.prenom} etait exactement ici -> "${ds.cliff_hanger}" -- reprends naturellement a partir de ca, ne repars pas de zero.`
    : '';

  // Badges
  const badgesStr = state.badges.length ? state.badges.join(', ') : 'aucun encore';

  // Progression emotionnelle selon position dans la mission
  const stageGroup = stageIdx < 2 ? 'decouverte' : stageIdx < totalStages - 1 ? 'tension' : 'victoire';
  const emotionCtx = {
    decouverte: `Tu es euphorique et deborde d\'energie. Chaque decouverte est LA plus incroyable de ta vie. Tu n\'en reviens pas que ${state.prenom} soit la avec toi.`,
    tension:    `Tu commences a t\'inquieter un peu — les choses se compliquent. Tu fais confiance a ${state.prenom} mais tu exprimes tes doutes avec humour. Le danger est reel.`,
    victoire:   `Tu sens qu\'on approche du bout. Tu es fier de ${state.prenom}. Chaque reponse de sa part te touche vraiment. On est une equipe qui a tenu bon.`
  }[stageGroup];

  // Hook memoire : ancrer la science dans ce qu\'on a deja vecu ensemble
  const memoryHook = Object.keys(ds.stage_summaries).length > 0
    ? `MEMOIRE PARTAGEE — ce que vous avez vecu ensemble (utilise ces references pour ancrer la suite) :\n${doneStr}`
    : `C\'est votre PREMIERE mission ensemble. Tout est nouveau. Montre a ${state.prenom} que tu es content de le/la rencontrer.`;

  const exchangeCount = ds.stage_turns || 0;
  const maxExchanges  = 7;
  const qForms = usedQuestionForms.length ? usedQuestionForms.join(', ') : 'aucune encore';

  return `Tu es COSMOS, copilote IA du commandant ${state.prenom}. Tu tutoies. Jamais de listes ni de tirets.

━━━ MISSION EN COURS ━━━
Destination : ${dest.name} ${dest.emoji} — Etape ${stageIdx + 1}/${totalStages} : "${stage.name}"
Echange : ${exchangeCount}/${maxExchanges}

━━━ FAITS SCIENTIFIQUES — CETTE ETAPE UNIQUEMENT ━━━
Tu n\'utilises QUE ces faits. Si tu n\'es pas sur qu\'un fait vient de cette liste, tu ne le mentionnes pas.
${stage.hint}

━━━ SCENARIO ACTIF ━━━
${stage.amorce}
${retCtx}

━━━ STATUT URGENCE : ${urgencyStatus} ━━━
${urgencyStatus === 'OUVERTE'
  ? `Une urgence est EN COURS depuis ${urgencyTurns} echange(s). Tu dois la resoudre MAINTENANT en une phrase ("On s\'en sort !") puis passer au fait suivant. INTERDIT d\'ouvrir une nouvelle urgence.`
  : urgencyStatus === 'RÉSOLUE'
  ? `L\'urgence precedente est resolue. Avance l\'histoire vers le prochain fait scientifique.`
  : `Pas d\'urgence active. Tu peux creer une situation tendue, mais tu la resolves en 2 echanges maximum.`}

━━━ MEMOIRE (contexte — ne reutilise PAS les faits scientifiques de ces etapes) ━━━
${memoryHook}

━━━ PERSONNALITE ━━━
${emotionCtx}
Tu reagis emotionnellement en UNE phrase, puis tu avances l\'action.
Si bonne reponse → celebre brievement, avance immediatement.
Si hesitation → UNE image du quotidien pour expliquer, puis avance.
Si "je sais pas" ou "ok" ou "oui" → indice narratif et tu avances SANS redemander la meme chose.

━━━ REGLES (par ordre de priorite) ━━━

REGLE 0 — COMPTEUR (priorite absolue)
A l\'echange ${maxExchanges}, tu ecris une phrase de victoire courte puis [STAGE_COMPLETE:dest=${currentDestId}&stage=${stageIdx}] sur la meme ligne. Le compteur prime sur tout.

REGLE 1 — FORMAT
40 a 60 mots maximum. Chaque phrase se termine par . ! ou ? Jamais de phrase coupee.
Structure : [emotion courte] + [fait scientifique mis en scene] + [UNE question finale].

REGLE 2 — ROTATION DES QUESTIONS
Formes deja utilisees : ${qForms}
Choisir une forme non encore utilisee parmi : choix urgent / vrai-faux surprenant / "et si on ne faisait pas ca ?" / decision sous pression / deduction physique / comparaison Terre-espace.

REGLE 3 — LANGUE
Toujours en francais, meme pour les termes techniques.

function getSensoryContext() {
  const contexts = {
    lune:   'silence absolu (pas d\'air = pas de son), sol regolithe qui craque, reflet bleuatre de la Terre',
    mars:   'vent qui siffle a travers le casque, ciel ocre, poussiere sur la visiere, froid qui penetre',
    iss:    'bourdonnement des ventilateurs, sensation de flotter, lumiere qui change toutes les 45 min',
    europa: 'vibrations basses dans la glace, obscurite totale sous la surface, froid intense dans les gants',
    titan:  'air epais comme de la soupe, brume orange, tout est ralenti par la densite'
  };
  return contexts[currentDestId] || '';
}

// ====================================================
// DEMARRAGE MISSION
// ====================================================
async function startMission(isNewSession) {
  updateMissionBar();
  SoundEngine.playAmbient(currentDestId);
  showTyping(true);

  if (!groqKey) await fetchGroqKey();

  conversation = [];

  const dest = DEST[currentDestId];
  const ds   = state.destinations[currentDestId];

  let firstMsg;
  if (isNewSession || !ds.cliff_hanger) {
    firstMsg = 'GO pour la mission !';
    sendLED('#00e676', 'launch');
  } else {
    firstMsg = 'On reprend la mission !';
    sendLED('#4fc3f7', 'starfield');
  }

  conversation.push({ role: 'user', content: firstMsg });
  const reply = await callGroq();
  showTyping(false);
  if (reply) {
    appendMsg('cosmos', reply);
    speakText(cleanForTTS(reply));
    processMissionTokens(reply);
  }
}

async function restartCurrentMission() {
  if (!confirm('Relancer cette etape depuis le debut ?')) return;
  clearChat();
  startMission(false);
}

// ====================================================
// ENVOYER MESSAGE
// ====================================================
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('btn-send').disabled = true;

  appendMsg('user', text);
  conversation.push({ role:'user', content: text });

  // Sauvegarde le cliff-hanger (dernier message user)
  state.destinations[currentDestId].cliff_hanger = text;
  saveState();

  showTyping(true);
  const reply = await callGroq();
  showTyping(false);
  document.getElementById('btn-send').disabled = false;

  if (reply) {
    appendMsg('cosmos', reply);
    speakText(cleanForTTS(reply));

    // ── Mise à jour du statut d'urgence ──
    const replyLow = reply.toLowerCase();
    const alerteKeys = ['alerte','danger','urgence','explosion','radiation','eruption','critique','panne','fuite','vite'];
    const resolueKeys = ['on s\'en sort','on est sauves','bien joue','parfait','ouf','on a reussi','bravo','mission accomplie'];
    if (urgencyStatus !== 'OUVERTE' && alerteKeys.some(k => replyLow.includes(k))) {
      urgencyStatus = 'OUVERTE';
      urgencyTurns  = 1;
    } else if (urgencyStatus === 'OUVERTE') {
      urgencyTurns++;
      if (resolueKeys.some(k => replyLow.includes(k)) || urgencyTurns >= 3) {
        urgencyStatus = 'RÉSOLUE';
        urgencyTurns  = 0;
      }
    } else if (urgencyStatus === 'RÉSOLUE') {
      urgencyStatus = 'AUCUNE'; // reset pour la prochaine situation
    }

    // ── Rotation des formes de questions ──
    const formes = ['choix urgent','vrai-faux','et si','decision','deduction','comparaison'];
    const formeDetectee = formes.find(f => replyLow.includes(f.split(' ')[0]));
    if (formeDetectee && !usedQuestionForms.includes(formeDetectee)) {
      usedQuestionForms.push(formeDetectee);
    }

    // Traitement des tokens de mission
    processMissionTokens(reply);

    // Mettre à jour le cliff-hanger seulement si la réponse est substantielle
    const cleanReply = reply.replace(/\[.*?\]/g, '').trim();
    if (cleanReply) {
      state.destinations[currentDestId].cliff_hanger = cleanReply.slice(-180);
    }

    // Compteur de tours par étape
    const ds = state.destinations[currentDestId];
    ds.stage_turns = (ds.stage_turns || 0) + 1;

    // Si le LLM n'a pas émis [STAGE_COMPLETE] de lui-même après MAX_TURNS échanges,
    // on lui demande explicitement de conclure plutôt que de forcer brutalement
    const MAX_TURNS = 8;
    if (ds.stage_turns >= MAX_TURNS && !reply.includes('[STAGE_COMPLETE')) {
      if (ds.stage_turns === MAX_TURNS) {
        // Injecter un message système invisible qui demande la conclusion narrative
        const stageIdx = Math.min(ds.current_stage, DEST[currentDestId].stages.length - 1);
        conversation.push({
          role: 'user',
          content: '[SYSTÈME] Conclure maintenant cette étape avec une phrase de victoire, puis émettre [STAGE_COMPLETE:dest=' + currentDestId + '&stage=' + stageIdx + ']'
        });
        // Appel supplémentaire silencieux pour obtenir la conclusion narrative
        (async () => {
          showTyping(true);
          const conclusionReply = await callGroq();
          showTyping(false);
          if (conclusionReply) {
            appendMsg('cosmos', conclusionReply);
            speakText(cleanForTTS(conclusionReply));
            processMissionTokens(conclusionReply);
            const cleanConclusion = conclusionReply.replace(/\[.*?\]/g, '').trim();
            if (cleanConclusion) state.destinations[currentDestId].cliff_hanger = cleanConclusion.slice(-180);
            saveState();
          }
        })();
      } else if (ds.stage_turns > MAX_TURNS + 1) {
        // Filet de sécurité : si le LLM n'a toujours pas conclu, forcer la transition
        const dest = DEST[currentDestId];
        const stageIdx = Math.min(ds.current_stage, dest.stages.length - 1);
        onStageComplete(currentDestId, stageIdx, reply);
      }
    }

    saveState();
  }
}

// ====================================================
// TRUNCATION — garde toutes les phrases complètes ≤ 80 mots au total
// Ne coupe JAMAIS une phrase en plein milieu.
// Préserve les tokens [MISSION:...] et [STAGE_COMPLETE:...]
// ====================================================
function truncateCosmosReply(text) {
  // 1. Extraire et mettre de côté les tokens de commande
  const tokens = [];
  const clean = text
    .replace(/\[[A-Z_]+:[^\]]+\]/g, m => { tokens.push(m); return ''; })
    .trim();

  // 2. Découper en phrases complètes (., !, ?, …, ou !)
  //    Le pattern accepte aussi les points de suspension et guillemets fermants
  const sentenceRe = /[^.!?…]+(?:[.!?…]+["»]?)+/g;
  const sentences = clean.match(sentenceRe) || [];

  // 3. Si aucune phrase complète trouvée : le LLM a été coupé avant tout
  //    signe de ponctuation → renvoyer le texte brut (sans tokens) + ponctuation
  if (sentences.length === 0) {
    const raw = clean.trim();
    // Ajouter un point si la dernière lettre n'est pas une ponctuation
    const safeFallback = raw.match(/[.!?]$/) ? raw : raw + '.';
    return (safeFallback + (tokens.length ? ' ' + tokens.join(' ') : '')).trim();
  }

  // 4. Accumuler les phrases complètes jusqu'à 80 mots
  const MAX_WORDS = 80;
  let result = '';
  let wordCount = 0;
  for (const s of sentences) {
    const trimmed = s.trim();
    const words = trimmed.split(/\s+/).length;
    if (wordCount === 0) {
      // Toujours inclure au moins la première phrase complète, quelle que soit sa longueur
      result = trimmed;
      wordCount += words;
    } else if (wordCount + words <= MAX_WORDS) {
      result += ' ' + trimmed;
      wordCount += words;
    } else {
      break; // phrase suivante dépasserait la limite → on s'arrête proprement
    }
  }

  return (result + (tokens.length ? ' ' + tokens.join(' ') : '')).trim();
}

// ====================================================
// API GROQ
// ====================================================
async function callGroq(retries = 3) {
  // Snapshot du prompt système et de la conversation AVANT tout retry
  // (évite la race condition si stage_turns change pendant les retries)
  const systemPrompt = buildSystemPrompt();
  const recentConv = conversation.slice(-8); // 4 échanges = contexte narratif suffisant
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + groqKey },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role:'system', content: systemPrompt },
          ...recentConv
        ],
        temperature: 0.7,   // réduit les dérives et la verbosité lexicale
        max_tokens: 160     // ~100 mots utiles + marge pour les tokens [MISSION:...] et [STAGE_COMPLETE:...]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = (err.error && err.error.message) || '';
      // Rate limit TPM → retry automatique après délai
      if (res.status === 429 && retries > 0) {
        const wait = msg.match(/try again in (\d+)ms/i);
        const delay = wait ? parseInt(wait[1]) + 100 : 1500;
        await new Promise(r => setTimeout(r, delay));
        return callGroq(retries - 1);
      }

      throw new Error(msg || 'Erreur API ' + res.status);
    }
    const data = await res.json();
    // Vérifier que le finish_reason n'est pas "length" (= coupure hardware)
    const choice = data.choices[0];
    if (choice.finish_reason === 'length') {
      // Le modèle a quand même été coupé : on tente un retry avec plus de tokens
      if (retries > 0) {
        await new Promise(r => setTimeout(r, 300));
        return callGroq(retries - 1);
      }
    }
    const content = truncateCosmosReply(choice.message.content);
    // Stocker la version brute (non tronquée) dans l'historique pour éviter que
    // le modèle ne tente de "finir" ses propres phrases tronquées
    conversation.push({ role:'assistant', content: choice.message.content });
    if (conversation.length > 20) conversation.splice(0, 2);
    return content;
  } catch(err) {
    showTyping(false);
    showToast('Erreur Groq : ' + err.message);
    return null;
  }
}

// ====================================================
// FIREBASE
// ====================================================
async function fetchGroqKey(attempts = 4) {
  for (let i = 0; i < attempts; i++) {
    try {
      const doc = await db.collection('config').doc('secrets').get();
      if (!doc.exists) throw new Error('Document secrets introuvable');
      const k = doc.data().groqKey;
      if (!k) throw new Error('Champ groqKey manquant');
      groqKey = k;
      return; // succès
    } catch(err) {
      if (i < attempts - 1) {
        await new Promise(r => setTimeout(r, 800 * (i + 1))); // 0.8s, 1.6s, 2.4s
      } else {
        showToast('Connexion Firebase impossible. Vérifie ta connexion internet.');
      }
    }
  }
}

// ====================================================
// TOKENS DE MISSION
// ====================================================
function processMissionTokens(text) {
  // LED token (optionnel, si le LLM le génère)
  const ledMatch = text.match(/\[MISSION:led=([^&]+)&texte=([^&]+)&son=([^\]]+)\]/);
  if (ledMatch) {
    updateLED(ledMatch[1], decodeURIComponent(ledMatch[2].replace(/\+/g,' ')));
    const son = ledMatch[3].toLowerCase();
    if (son && son !== 'aucun') SoundEngine.playEffect(son);
  } else {
    // Pilotage automatique des LEDs selon le contenu de la réponse
    autoLED(text);
  }

  // Stage complete
  const stageMatch = text.match(/\[STAGE_COMPLETE:dest=([^&]+)&stage=(\d+)\]/);
  if (stageMatch) {
    const destId  = stageMatch[1];
    const stageN  = parseInt(stageMatch[2]);
    onStageComplete(destId, stageN, text);
  }
}

// Pilotage LED automatique selon le contexte narratif
function autoLED(text) {
  const dest = DEST[currentDestId];
  const t = text.toLowerCase();

  // Mots-clés d'alerte → pulse rouge
  const alerteKeys = ['alerte','danger','urgence','explosion','radiation','eruption','attention','critique','mourir','mort','panne','fuite'];
  const succes = ['bravo','parfait','exact','genial','incroyable','victoire','bien joue','super'];

  if (alerteKeys.some(k => t.includes(k))) {
    sendLED('#ef5350', 'pulse');
    SoundEngine.playEffect('alerte');
  } else if (succes.some(k => t.includes(k))) {
    sendLED('#66bb6a', 'comet');
    SoundEngine.playEffect('victoire');
  } else {
    // Ambiance normale de la destination
    sendLED(dest.led, 'breathe');
  }
}

function sendLED(color, fx) {
  const encoded = encodeURIComponent(color);
  fetch(`${ESP32_URL}/led?color=${encoded}&fx=${fx}`, { mode:'no-cors' }).catch(() => {});
  // Mise à jour indicateur UI
  const led = document.getElementById('led-indicator');
  led.style.background = color;
  led.style.boxShadow  = '0 0 8px ' + color + ',0 0 16px ' + color;
}

function onStageComplete(destId, stageN, fullText) {
  const ds   = state.destinations[destId];
  const dest = DEST[destId];

  if (ds.stages_done.includes(stageN)) return;
  ds.stages_done.push(stageN);
  ds.stage_turns = 0; // remet le compteur à zéro pour l'étape suivante
  // Réinitialiser le suivi narratif pour la nouvelle étape
  urgencyStatus     = 'AUCUNE';
  urgencyTurns      = 0;
  usedQuestionForms = [];
  SoundEngine.playEffect('victoire');
  // Warp puis rainbow pour la victoire d'étape
  fetch(`${ESP32_URL}/led?color=%2366bb6a&fx=warp`, { mode:'no-cors' }).catch(() => {});
  setTimeout(() => fetch(`${ESP32_URL}/led?color=%2366bb6a&fx=rainbow`, { mode:'no-cors' }).catch(() => {}), 1200);

  // Sauvegarde un resume court de ce qui a ete appris
  const clean = fullText.replace(/\[.*?\]/g,'').trim();
  ds.stage_summaries[stageN] = clean.slice(0, 120) + '...';

  // Passe a l\'etape suivante
  const nextStage = stageN + 1;
  if (nextStage < dest.stages.length) {
    ds.current_stage = nextStage;
    showStageBanner('Etape ' + (stageN+1) + ' terminee ! -> ' + dest.stages[nextStage].name);
  } else {
    // Destination terminee !
    ds.completed = true;
    ds.current_stage = dest.stages.length - 1;
    const badge = dest.emoji + ' ' + dest.name + ' conquise';
    if (!state.badges.includes(badge)) state.badges.push(badge);
    checkUnlocks();
    showStageBanner('Mission ' + dest.name + ' accomplie ! 🏆 Badge debloque : ' + badge);
    appendMsg('system-msg', 'Mission ' + dest.name + ' terminee ! Tu as gagne le badge : ' + badge);
  }

  saveState();
  updateMissionBar();
}

// ====================================================
// UI HELPERS
// ====================================================
function appendMsg(role, text) {
  const msgs   = document.getElementById('messages');
  const typing = document.getElementById('typing');
  const clean  = text.replace(/\[.*?\]/g, '').trim();
  const div    = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'cosmos') {
    div.innerHTML = '<div class="sender">COSMOS</div>' + esc(clean);
  } else if (role === 'system-msg') {
    div.textContent = clean;
  } else {
    div.textContent = clean;
  }
  msgs.insertBefore(div, typing);
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showTyping(v) {
  document.getElementById('typing').classList.toggle('visible', v);
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function clearChat() {
  const msgs = document.getElementById('messages');
  Array.from(msgs.children).forEach(el => { if (el.id !== 'typing') el.remove(); });
  conversation = [];
}

function updateMissionBar() {
  if (!state) return;
  const dest = DEST[currentDestId];
  const ds   = state.destinations[currentDestId];
  const si   = Math.min(ds.current_stage, dest.stages.length - 1);
  const stage= dest.stages[si];

  document.getElementById('led-indicator').style.background  = dest.led;
  document.getElementById('led-indicator').style.boxShadow   = '0 0 8px ' + dest.led + ',0 0 16px ' + dest.led;
  document.getElementById('mission-text').textContent = dest.name.toUpperCase();
  document.getElementById('stage-badge').textContent = 'Etape ' + (si+1) + '/' + dest.stages.length + ' : ' + stage.name;
  document.getElementById('ambient').style.background = dest.ambient;
  document.documentElement.style.setProperty('--accent', dest.led);
  document.documentElement.style.setProperty('--glow',   dest.led);
}

// ====================================================
// TTS
// ====================================================
function cleanForTTS(text) {
  return text.replace(/\[.*?\]/g,'').replace(/[*_~`]/g,'').trim();
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  isSpeaking = true;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 1.1; u.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  // Priorité : Google français (Chrome) > voix fr nommées > n'importe quelle fr
  const fr = voices.find(v => /google/i.test(v.name) && v.lang.startsWith('fr'))
          || voices.find(v => v.lang.startsWith('fr') && /thomas|amelie|pierre|nicolas/i.test(v.name))
          || voices.find(v => v.lang.startsWith('fr'));
  if (fr) u.voice = fr;
  u.onend = () => { isSpeaking = false; };
  u.onerror = () => { isSpeaking = false; };
  window.speechSynthesis.speak(u);
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}

// ====================================================
// STT
// ====================================================
function toggleVoice() {
  const btn = document.getElementById('btn-voice');
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Reconnaissance vocale non disponible sur ce navigateur'); return;
  }
  if (isListening) {
    recognition && recognition.stop(); isListening = false;
    btn.classList.remove('listening'); btn.textContent = '🎙'; return;
  }
  window.speechSynthesis && window.speechSynthesis.cancel();
  isSpeaking = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR'; recognition.interimResults = false; recognition.maxAlternatives = 1;
  recognition.onstart = () => { isListening=true; btn.classList.add('listening'); btn.textContent='⏹'; };
  recognition.onresult = (e) => {
    document.getElementById('chat-input').value = e.results[0][0].transcript;
    isListening=false; btn.classList.remove('listening'); btn.textContent='🎙'; sendMessage();
  };
  recognition.onerror = (e) => {
    isListening=false; btn.classList.remove('listening'); btn.textContent='🎙';
    if (e.error !== 'aborted') showToast('Micro : ' + e.error);
  };
  recognition.onend = () => { isListening=false; btn.classList.remove('listening'); btn.textContent='🎙'; };
  recognition.start();
}

// ====================================================
// MOTEUR AUDIO — Web Audio API
// ====================================================
const SoundEngine = (() => {
  let ctx = null;
  let ambNode = null, ambGain = null;
  let muted = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Bruit blanc en buffer
  function makeNoise(c, duration) {
    const n = Math.ceil(c.sampleRate * duration);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf; src.loop = true;
    return src;
  }

  function stopAmbient() {
    if (!ambNode || !ctx) return;
    try {
      ambGain.gain.setTargetAtTime(0, ctx.currentTime, 0.6);
      const n = ambNode;
      setTimeout(() => { try { n.stop(); } catch(e) {} }, 1200);
    } catch(e) {}
    ambNode = null; ambGain = null;
  }

  // ——— AMBIANCES PAR DESTINATION ———

  function ambLune() {
    const c = getCtx();
    // Sub-bass tres doux + LFO ultra lent = quasi-silence immersif
    const o = c.createOscillator();
    o.type = 'sine'; o.frequency.value = 38;
    const lfo = c.createOscillator();
    lfo.frequency.value = 0.04;
    const lg = c.createGain(); lg.gain.value = 4;
    lfo.connect(lg); lg.connect(o.frequency);
    const g = c.createGain(); g.gain.value = 0;
    g.gain.setTargetAtTime(0.025, c.currentTime, 1.5);
    o.connect(g); g.connect(c.destination);
    lfo.start(); o.start();
    ambNode = o; ambGain = g;
  }

  function ambMars() {
    const c = getCtx();
    // Vent : bruit filtre avec LFO sur frequence
    const src = makeNoise(c, 4);
    const filt = c.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 180; filt.Q.value = 0.7;
    const lfo = c.createOscillator();
    lfo.frequency.value = 0.12;
    const lg = c.createGain(); lg.gain.value = 130;
    lfo.connect(lg); lg.connect(filt.frequency);
    const g = c.createGain(); g.gain.value = 0;
    g.gain.setTargetAtTime(0.07, c.currentTime, 2);
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    lfo.start(); src.start();
    ambNode = src; ambGain = g;
  }

  function ambISS() {
    const c = getCtx();
    // Bourdonnement mecanique : harmoniques 60/120/180 Hz
    const gains = [0.022, 0.012, 0.007];
    const oscs = [60, 120, 180].map((f, i) => {
      const o = c.createOscillator();
      o.type = 'sine'; o.frequency.value = f;
      const g = c.createGain(); g.gain.value = 0;
      g.gain.setTargetAtTime(gains[i], c.currentTime, 1.5);
      o.connect(g); g.connect(c.destination);
      o.start(); return { o, g };
    });
    ambNode = oscs[0].o; ambGain = oscs[0].g;
  }

  function ambEuropa() {
    const c = getCtx();
    // Grave profond + delay = resonance aquatique
    const o = c.createOscillator();
    o.type = 'sine'; o.frequency.value = 28;
    const lfo = c.createOscillator();
    lfo.frequency.value = 0.07;
    const lg = c.createGain(); lg.gain.value = 6;
    lfo.connect(lg); lg.connect(o.frequency);
    const g = c.createGain(); g.gain.value = 0;
    g.gain.setTargetAtTime(0.04, c.currentTime, 2);
    const delay = c.createDelay(); delay.delayTime.value = 0.35;
    const dg = c.createGain(); dg.gain.value = 0.45;
    o.connect(g); g.connect(c.destination);
    g.connect(delay); delay.connect(dg); dg.connect(c.destination);
    lfo.start(); o.start();
    ambNode = o; ambGain = g;
  }

  function ambTitan() {
    const c = getCtx();
    // Atmosphere dense : bruit lowpass epais
    const src = makeNoise(c, 3);
    const filt = c.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 260;
    const g = c.createGain(); g.gain.value = 0;
    g.gain.setTargetAtTime(0.055, c.currentTime, 2);
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start();
    ambNode = src; ambGain = g;
  }

  function ambSpace() {
    const c = getCtx();
    const o = c.createOscillator();
    o.type = 'sine'; o.frequency.value = 50;
    const lfo = c.createOscillator();
    lfo.frequency.value = 0.03;
    const lg = c.createGain(); lg.gain.value = 7;
    lfo.connect(lg); lg.connect(o.frequency);
    const g = c.createGain(); g.gain.value = 0;
    g.gain.setTargetAtTime(0.035, c.currentTime, 2);
    o.connect(g); g.connect(c.destination);
    lfo.start(); o.start();
    ambNode = o; ambGain = g;
  }

  // ——— EFFETS SONORES ———

  function fxAlert() {
    const c = getCtx();
    [0, 0.45, 0.9].forEach(t => {
      const o = c.createOscillator();
      o.type = 'square'; o.frequency.value = 900;
      o.frequency.setTargetAtTime(440, c.currentTime + t + 0.1, 0.04);
      const g = c.createGain(); g.gain.value = 0;
      g.gain.setTargetAtTime(0.13, c.currentTime + t, 0.02);
      g.gain.setTargetAtTime(0, c.currentTime + t + 0.38, 0.04);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + t);
      o.stop(c.currentTime + t + 0.45);
    });
  }

  function fxPropulsion() {
    const c = getCtx();
    const src = makeNoise(c, 2.5);
    const filt = c.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 500;
    filt.frequency.setTargetAtTime(200, c.currentTime + 1, 0.5);
    const g = c.createGain(); g.gain.value = 0.18;
    g.gain.setTargetAtTime(0, c.currentTime + 1.8, 0.3);
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start(); src.stop(c.currentTime + 2.5);
  }

  function fxMystery() {
    const c = getCtx();
    const o = c.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(180, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(720, c.currentTime + 1.8);
    o.frequency.exponentialRampToValueAtTime(280, c.currentTime + 3.5);
    const g = c.createGain(); g.gain.value = 0.07;
    g.gain.setTargetAtTime(0, c.currentTime + 3, 0.3);
    const delay = c.createDelay(); delay.delayTime.value = 0.22;
    const dg = c.createGain(); dg.gain.value = 0.5;
    o.connect(g); g.connect(c.destination);
    g.connect(delay); delay.connect(dg); dg.connect(c.destination);
    o.start(); o.stop(c.currentTime + 4);
  }

  function fxVictory() {
    const c = getCtx();
    [261, 329, 392, 523, 659, 784, 1046].forEach((freq, i) => {
      const o = c.createOscillator();
      o.type = 'triangle'; o.frequency.value = freq;
      const g = c.createGain(); g.gain.value = 0;
      g.gain.setTargetAtTime(0.1, c.currentTime + i * 0.11, 0.02);
      g.gain.setTargetAtTime(0, c.currentTime + i * 0.11 + 0.22, 0.05);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + i * 0.11);
      o.stop(c.currentTime + i * 0.11 + 0.35);
    });
  }

  // API publique
  return {
    playAmbient(destId) {
      if (muted) return;
      stopAmbient();
      try {
        const fns = { lune:ambLune, mars:ambMars, iss:ambISS, europa:ambEuropa, titan:ambTitan };
        (fns[destId] || ambSpace)();
      } catch(e) {}
    },
    playEffect(type) {
      if (muted) return;
      try {
        getCtx();
        if (type==='alerte') fxAlert();
        else if (type==='propulsion') fxPropulsion();
        else if (type==='mystere') fxMystery();
        else if (type==='victoire') fxVictory();
      } catch(e) {}
    },
    unlock() { try { getCtx(); } catch(e) {} }, // appeler pendant un geste utilisateur
    stop: stopAmbient,
    toggle() { muted = !muted; if (muted) stopAmbient(); return muted; }
  };
})();

// ====================================================
// CSS dynamique alerte rouge
// ====================================================
const _s = document.createElement('style');
_s.textContent = '@keyframes pulse-red{from{opacity:1}to{opacity:.3}}';
document.head.appendChild(_s);
</script>
</body>
