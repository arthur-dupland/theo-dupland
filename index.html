<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COSMOS — Mission Spatiale Interactive</title>
  <style>
    :root {
      --accent: #4fc3f7;
      --glow:   #4fc3f7;
      --bg:     #020818;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #e0f0ff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ——— ETOILES ——— */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--d,3s) var(--delay,0s) infinite alternate ease-in-out;
    }
    @keyframes twinkle {
      from { opacity:.1; transform:scale(1); }
      to   { opacity:.9; transform:scale(1.4); }
    }
    #ambient { position:fixed; inset:0; pointer-events:none; z-index:1; transition:background 1.5s ease; }

    /* ——— ECRANS GENERAUX ——— */
    .screen {
      display: none; position: relative; z-index: 10;
      width: 100%; max-width: 700px;
      animation: fadeUp .7s ease;
    }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ——— WELCOME ——— */
    #screen-welcome {
      align-items: center; text-align: center; padding: 2rem 1rem;
      height: 100vh; justify-content: center;
    }
    .rocket-anim { font-size:4rem; animation: float 3s ease-in-out infinite; margin-bottom:1rem; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    #screen-welcome h1 {
      font-size:3.2rem; letter-spacing:.3em; color:var(--accent);
      text-shadow:0 0 40px var(--glow),0 0 80px var(--glow); margin-bottom:.3rem;
    }
    .subtitle { font-size:.9rem; letter-spacing:.2em; color:#7ecfff; opacity:.8; margin-bottom:2.5rem; }
    .form-group { display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .form-group label { font-size:1rem; color:#a0d8ef; }
    .cosmos-input {
      background:rgba(79,195,247,.1); border:1px solid rgba(79,195,247,.4);
      border-radius:12px; color:white; font-size:1.2rem; padding:.7rem 1.5rem;
      text-align:center; outline:none; width:220px; transition:border-color .3s,box-shadow .3s;
    }
    .cosmos-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(79,195,247,.3); }
    .cosmos-input::placeholder { color:rgba(255,255,255,.25); }
    .btn-primary {
      background:linear-gradient(135deg,#1565c0,#0288d1); border:none;
      border-radius:50px; color:white; cursor:pointer; font-size:.95rem;
      font-weight:600; letter-spacing:.1em; padding:.8rem 2.2rem;
      box-shadow:0 0 25px rgba(79,195,247,.4); transition:transform .2s,box-shadow .2s;
    }
    .btn-primary:hover { transform:scale(1.05); box-shadow:0 0 40px rgba(79,195,247,.6); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* ——— RETURNING ——— */
    #screen-returning {
      align-items: center; text-align: center; padding: 2rem 1rem;
      height: 100vh; justify-content: center; gap: 1.5rem;
    }
    #screen-returning h2 { font-size:1.8rem; color:var(--accent); }
    #screen-returning .cliff {
      font-size:1rem; color:#b0d8ff; font-style:italic;
      max-width:480px; line-height:1.7;
      background:rgba(79,195,247,.07); border-left:3px solid var(--accent);
      padding:1rem 1.2rem; border-radius:0 12px 12px 0; text-align:left;
    }
    .ret-btns { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .btn-ghost {
      background:rgba(79,195,247,.1); border:1px solid rgba(79,195,247,.35);
      border-radius:50px; color:#a0d8ef; cursor:pointer; font-size:.9rem;
      padding:.65rem 1.6rem; transition:all .2s;
    }
    .btn-ghost:hover { background:rgba(79,195,247,.2); color:white; }

    /* ——— DESTINATION SELECT ——— */
    #screen-destination {
      height: 100vh; padding: 1.5rem 1rem; overflow-y: auto; gap: 1.2rem;
      scrollbar-width: thin; scrollbar-color: rgba(79,195,247,.3) transparent;
    }
    #screen-destination h2 { color:var(--accent); font-size:1.4rem; letter-spacing:.1em; text-align:center; }
    .dest-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.8rem; }
    .dest-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(79,195,247,.2);
      border-radius:16px; padding:1.1rem; cursor:pointer; transition:all .25s;
      position:relative; overflow:hidden;
    }
    .dest-card:hover:not(.locked) { background:rgba(79,195,247,.1); border-color:rgba(79,195,247,.5); transform:translateY(-2px); }
    .dest-card.locked { opacity:.4; cursor:not-allowed; filter:grayscale(.6); }
    .dest-card.current { border-color:var(--accent); box-shadow:0 0 20px rgba(79,195,247,.2); }
    .dest-card .dest-emoji { font-size:1.8rem; margin-bottom:.4rem; }
    .dest-card .dest-name { font-size:.95rem; font-weight:700; color:#e0f0ff; }
    .dest-card .dest-progress {
      font-size:.72rem; color:#7ecfff; margin-top:.3rem;
      display:flex; align-items:center; gap:.5rem;
    }
    .progress-bar {
      flex:1; height:4px; background:rgba(255,255,255,.1); border-radius:4px; overflow:hidden;
    }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width .5s ease; }
    .dest-card .lock-icon { position:absolute; top:.7rem; right:.7rem; font-size:.9rem; }
    .dest-card .unlock-hint { font-size:.65rem; color:rgba(255,255,255,.35); margin-top:.3rem; }
    .badge-row { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
    .badge {
      font-size:.65rem; padding:.15rem .5rem; background:rgba(255,193,7,.15);
      border:1px solid rgba(255,193,7,.3); border-radius:20px; color:#ffd54f;
    }

    /* ——— CHAT ——— */
    #screen-chat { height:100vh; padding:0 .5rem; }
    #mission-bar {
      display:flex; align-items:center; gap:.7rem;
      padding:.65rem .8rem; background:rgba(0,0,0,.55);
      border-bottom:1px solid rgba(79,195,247,.15); flex-shrink:0;
    }
    #mission-bar .logo { font-size:1.2rem; font-weight:800; color:var(--accent); letter-spacing:.15em; text-shadow:0 0 15px var(--glow); }
    #mission-bar .sep { flex:1; }
    #led-indicator {
      width:12px; height:12px; border-radius:50%;
      background:var(--glow); box-shadow:0 0 8px var(--glow),0 0 16px var(--glow);
      transition:background .8s,box-shadow .8s; flex-shrink:0;
    }
    #mission-text { font-size:.7rem; letter-spacing:.12em; color:#a0d8ef; font-weight:600; }
    #stage-badge {
      font-size:.65rem; padding:.15rem .5rem;
      background:rgba(79,195,247,.15); border:1px solid rgba(79,195,247,.3);
      border-radius:20px; color:var(--accent); white-space:nowrap;
    }
    .top-btn {
      background:none; border:1px solid rgba(255,255,255,.15); border-radius:8px;
      color:rgba(255,255,255,.4); cursor:pointer; font-size:.65rem; padding:.25rem .55rem;
      transition:all .2s;
    }
    .top-btn:hover { color:white; border-color:rgba(255,255,255,.5); }

    #messages {
      flex:1; overflow-y:auto; padding:.8rem .3rem;
      display:flex; flex-direction:column; gap:.9rem;
      scrollbar-width:thin; scrollbar-color:rgba(79,195,247,.25) transparent;
    }
    #messages::-webkit-scrollbar { width:3px; }
    #messages::-webkit-scrollbar-thumb { background:rgba(79,195,247,.25); border-radius:3px; }

    .msg {
      max-width:87%; border-radius:18px; padding:.8rem 1rem;
      font-size:.93rem; line-height:1.55; animation:msgIn .3s ease;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .msg.cosmos {
      align-self:flex-start;
      background:rgba(21,101,192,.22); border:1px solid rgba(79,195,247,.22);
      border-bottom-left-radius:4px;
    }
    .msg.cosmos .sender { font-size:.65rem; letter-spacing:.14em; color:var(--accent); font-weight:700; margin-bottom:.3rem; }
    .msg.user {
      align-self:flex-end; background:rgba(2,136,209,.28);
      border:1px solid rgba(79,195,247,.18); border-bottom-right-radius:4px;
    }
    .msg.system-msg {
      align-self:center; background:rgba(255,193,7,.1);
      border:1px solid rgba(255,193,7,.25); border-radius:12px;
      font-size:.78rem; color:#ffd54f; text-align:center; max-width:90%; padding:.6rem 1rem;
    }

    #typing { display:none; align-self:flex-start; padding:.65rem .9rem;
      background:rgba(21,101,192,.18); border:1px solid rgba(79,195,247,.18);
      border-radius:18px; border-bottom-left-radius:4px; gap:4px; align-items:center; }
    #typing.visible { display:flex; }
    .dot {
      width:6px; height:6px; border-radius:50%; background:var(--accent);
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce {
      0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1}
    }

    #input-area {
      display:flex; align-items:center; gap:.5rem;
      padding:.7rem .3rem; border-top:1px solid rgba(79,195,247,.12); flex-shrink:0;
    }
    #chat-input {
      flex:1; background:rgba(79,195,247,.07); border:1px solid rgba(79,195,247,.22);
      border-radius:50px; color:white; font-size:.92rem; padding:.6rem 1.1rem;
      outline:none; transition:border-color .3s,box-shadow .3s;
    }
    #chat-input:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(79,195,247,.18); }
    #chat-input::placeholder { color:rgba(255,255,255,.22); }
    #btn-send {
      background:linear-gradient(135deg,#1565c0,#0288d1); border:none; border-radius:50%;
      color:white; cursor:pointer; font-size:1rem; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 12px rgba(79,195,247,.3); transition:transform .2s,box-shadow .2s; flex-shrink:0;
    }
    #btn-send:hover { transform:scale(1.1); box-shadow:0 0 22px rgba(79,195,247,.5); }
    #btn-send:disabled { opacity:.35; cursor:not-allowed; transform:none; }
    #btn-voice {
      background:rgba(79,195,247,.08); border:2px solid rgba(79,195,247,.28); border-radius:50%;
      color:var(--accent); cursor:pointer; font-size:1.1rem; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0;
    }
    #btn-voice:hover { background:rgba(79,195,247,.18); }
    #btn-voice.listening { background:rgba(244,67,54,.2); border-color:#f44336; color:#f44336; animation:pulse-mic 1s infinite; }
    @keyframes pulse-mic {
      0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.4)} 50%{box-shadow:0 0 0 10px rgba(244,67,54,0)}
    }

    /* ——— STAGE COMPLETE BANNER ——— */
    #stage-banner {
      display:none; position:fixed; top:0; left:0; right:0; z-index:100;
      background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(79,195,247,.15));
      border-bottom:1px solid rgba(0,255,136,.4); padding:.8rem 1rem;
      text-align:center; font-size:.85rem; color:#00ff88; font-weight:600;
      letter-spacing:.05em; animation:slideDown .5s ease;
    }
    @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }

    /* ——— TOAST ——— */
    #toast {
      display:none; position:fixed; bottom:5rem; left:50%; transform:translateX(-50%);
      background:rgba(244,67,54,.9); color:white; padding:.55rem 1.1rem;
      border-radius:20px; font-size:.82rem; z-index:200; animation:fadeUp .3s ease;
    }

    @media(max-width:500px) {
      .dest-grid { grid-template-columns:1fr; }
      #screen-welcome h1 { font-size:2.4rem; }
      .msg { font-size:.87rem; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="ambient"></div>

<!-- ========= ECRAN ACCUEIL (premiere fois) ========= -->
<div id="screen-welcome" class="screen">
  <span class="rocket-anim">🚀</span>
  <h1>COSMOS</h1>
  <p class="subtitle">MISSION SPATIALE INTERACTIVE</p>
  <form class="form-group" onsubmit="onWelcomeSubmit(event)">
    <label for="input-prenom">Ton nom, commandant ?</label>
    <input id="input-prenom" class="cosmos-input" type="text" placeholder="Arthur, Theo..." autocomplete="off" required maxlength="20">
    <button class="btn-primary" type="submit">🛸 Lancer la mission</button>
  </form>
</div>

<!-- ========= ECRAN RETOUR (sessions suivantes) ========= -->
<div id="screen-returning" class="screen">
  <div style="font-size:3rem">👨‍🚀</div>
  <h2 id="ret-title">Bon retour !</h2>
  <div id="ret-cliff" class="cliff"></div>
  <div class="ret-btns">
    <button class="btn-primary" onclick="continueLastMission()">▶ Continuer la mission</button>
    <button class="btn-ghost" onclick="showDestinations()">🗺 Changer de destination</button>
    <button class="btn-ghost" onclick="resetAll()">↺ Nouveau commandant</button>
  </div>
</div>

<!-- ========= DESTINATIONS ========= -->
<div id="screen-destination" class="screen">
  <h2>🗺 Choisir une destination</h2>
  <div class="dest-grid" id="dest-grid"></div>
  <div style="height:1rem"></div>
</div>

<!-- ========= CHAT ========= -->
<div id="screen-chat" class="screen">
  <div id="mission-bar">
    <span class="logo">COSMOS</span>
    <span class="sep"></span>
    <div id="led-indicator"></div>
    <span id="mission-text">EN ATTENTE</span>
    <span id="stage-badge"></span>
    <button class="top-btn" onclick="showDestinations()" title="Changer de destination">🗺</button>
    <button class="top-btn" onclick="restartCurrentMission()" title="Relancer la mission">↺</button>
    <button class="top-btn" id="btn-mute" onclick="toggleMute()" title="Son on/off">🔊</button>
    <button class="top-btn" id="btn-serial" onclick="toggleSerial()" title="Connecter le module lumineux (USB)">🔌</button>
  </div>

  <div id="messages">
    <div id="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div id="input-area">
    <button id="btn-voice" onclick="toggleVoice()" title="Parler">🎙</button>
    <input id="chat-input" type="text" placeholder="Tape ta reponse, commandant..."
      autocomplete="off" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    <button id="btn-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Stage complete banner -->
<div id="stage-banner"></div>
<!-- Toast -->
<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
'use strict';

// ====================================================
// FIREBASE
// ====================================================
firebase.initializeApp({
  apiKey:           'AIzaSyB-i-vDsRjGyoL76z-Q7-ApHBXy9e0LO44',
  authDomain:       'cosmos-c6896.firebaseapp.com',
  projectId:        'cosmos-c6896',
  storageBucket:    'cosmos-c6896.firebasestorage.app',
  messagingSenderId:'765932299609',
  appId:            '1:765932299609:web:8b00e011e51be1eb0c1848'
});
const db = firebase.firestore();

// ====================================================
// DESTINATIONS + ETAPES PEDAGOGIQUES
// ====================================================
const DEST = {
  lune: {
    id:'lune', name:'Lune', emoji:'🌕', led:'#b0d8ff',
    ambient:'radial-gradient(ellipse at center,rgba(176,216,255,.09) 0%,transparent 70%)',
    unlocked_by: [],
    stages: [
      { name:'Artemis IV — 3 jours dans l\'Orion', obj:'Comprendre le voyage Terre-Lune et pourquoi Artemis IV est la mission historique',
        hint:'ORDRE : 1. Interieur Orion — 4 personnes dans 4m2 depuis 48h. 2. Artemis IV = premier atterrissage depuis 1972. 3. Houston repond en 1,3 seconde. 4. Starship HLS apercu en orbite, 50m, sans personne. 5. SLS = 98m de fusee pour cette capsule. 6. Gravite lunaire 1/6 (30kg->5kg). BONUS si demande : toilettes dans l\'Orion = WC a aspiration comme mini-aspirateur, urine recyclee en eau potable.',
        amorce:'Heure 48. Tu colles ton nez au hublot de l\'Orion. La Lune prend tout l\'espace — enormee, grise, couverte de trous. A cote de toi, trois astronautes dorment ou mangent dans 4 m2. Ton coequipier te donne un truc lyophilise en sachet et dit : "T\'as vu ?" Il pointe quelque chose de brillant en orbite. Tu regardes — c\'est quoi ?' },
      { name:'Atterrissage a Shackleton', obj:'Comprendre comment Starship HLS atterrit et pourquoi le pole sud de la Lune',
        hint:'ORDRE : 1. Touchdown — regolithe en fontaine silencieuse (pas d\'air=pas d\'onde de souffle). 2. Pression du suit 0,3 atm O2 pur avant sortie. 3. Premier pas — 2cm d\'enfoncement, comme sable mouille. 4. Ciel noir meme si soleil visible — pas d\'atmosphere=pas de diffusion. 5. Shackleton 21km, fond -240 degC jamais de soleil, bord eclaire 89%.',
        amorce:'Le moteur rugit. Par le hublot, la Lune grossit a toute vitesse. Les jambes d\'atterrissage se deploient avec un CLAC metallique. Contact ! Un nuage de poussiere grise jaillit en silence autour du Starship. Plus aucun bruit. L\'alarme verte clignote : sas pret. Ton equipiere pose la main sur la poignee et te regarde. T\'es pret a sortir ?' },
      { name:'Le regolithe — l\'ennemi invisible', obj:'Comprendre pourquoi la poussiere lunaire est le plus grand danger de la base',
        hint:'ORDRE : 1. Visiere grise — regolithe=verre microscopique 10-100 microns (20x plus fin que farine). 2. Electrostatique — se charge comme ballon sur pull, colle a tout. 3. Joint qui grince — 1 grain bloque la flexion, combinaisons Apollo raidies en 3 EVAs. 4. Schmitt Apollo 17 poumons irrites apres 3h. 5. AxEMU nouveau suit 14 couches, visiere electrostatique. 6. 1 litre d\'eau/jour impossible de se laver. REGLE D\'OR : chaque probleme (visiere, joint, genou) = UNE SEULE mention puis COSMOS passe au fait suivant. JAMAIS de repetition, JAMAIS d\'angoisse prolongee.',
        amorce:'Cinq minutes dehors. Ta visiere est deja grise — la poussiere ne tombe pas, elle colle. Ton equipiere se retourne vers toi et pointe le sol : les traces de vos pas sont parfaites, gravees pour toujours. Mais sous vos bottes, cette meme poussiere est en train de faire quelque chose. Qu\'est-ce que tu remarques sur ta combinaison ?' },
      { name:'Fabriquer l\'air et l\'eau', obj:'Comprendre l\'ISRU : tirer l\'oxygene du sol et l\'eau de la glace de Shackleton',
        hint:'ORDRE : 1. Electrolyseur — chauffe regolithe a 900 degres, sol=40-45% O2 emprisonne, 1kg->630g O2. 2. Residus=metaux reutilisables. 3. Forage Shackleton — 3 milliards de tonnes de glace (LCROSS 2009). 4. Glace->H2O->H2 (carburant)+O2 (air). 5. Recyclage ECLSS 98% — sueur+haleine+urine->eau potable. Fil : decouverte choquante mais fascinante.',
        amorce:'La base sent le metal chaud. Une machine dans le coin vibre en permanence — elle ingere du sol lunaire et crache de l\'oxygene pur. Un tuyau relie le module cuisine a un autre engin qui... tu lis l\'etiquette... "eau recyclage urine". Tu regardes ton gobelet. Ton equipiere sourit. "Bois, t\'inquiete pas." Tu bois ?' },
      { name:'Vivre sur la Lune', obj:'Comprendre la vie quotidienne : manger, dormir, aller aux toilettes en 1/6 de gravite',
        hint:'ORDRE : 1. WC UWMS = aspiration comme aspirateur, ceinture pour ne pas flotter. 2. Pas de douche — shampoing sec, lingettes. 3. Nourriture lyophilisee, eau chaude ajoutee. 4. Sport 2h/jour obligatoire meme en 1/6 gravite — muscles s\'atrophient. 5. Soleil fixe au pole sud, pas de jour/nuit. 6. Appel video Houston 1,3s delai. Ton : drole, bizarre, pas clinique.',
        amorce:'Premier matin. Tu te reveilles dans ton sac de couchage fixe au mur. Tu dois aller aux toilettes. L\'astronaute d\'a cote te tend un manuel de 3 pages intitule "Comment utiliser les WC lunaires". Tu l\'ouvres. T\'es pret pour ca ?' },
      { name:'La nuit de 336 heures', obj:'Comprendre la nuit lunaire et pourquoi le nucleaire est la seule vraie solution energetique',
        hint:'ORDRE : 1. Soleil disparait — panneaux tombent a zero en quelques minutes. 2. Nuit=336h (-173 degC). 3. Crete Shackleton eclairee 89% — meilleur spot du systeme solaire. 4. Reacteur fission 40kW (NASA+DOE) prend le relais — RTG comme Curiosity. 5. Si reacteur s\'arrete : 4h avant -50 degC dans la base. Ton : tension crescendo, la nuit est une vraie menace.',
        amorce:'Le soleil touche l\'horizon. Ton equipiere dit : "Ca va tomber vite." En 8 minutes les panneaux solaires affichent zero. Le reacteur nucleaire prend le relais avec un bourdonnement sourd. Sur l\'ecran : "FISSION SURFACE POWER — NOMINAL". Tu regardes dehors. Le noir est total. Quelque chose dans ton casque bippe doucement. Qu\'est-ce que tu verifies en premier ?' },
      { name:'La Lune — tremplin vers Mars', obj:'Comprendre pourquoi la Lune prepare la mission Mars et ce qui change avec la distance',
        hint:'ORDRE : 1. Lune s\'eloigne — 384 400km en 3 jours, delai 1,3s. 2. Tout ce qu\'on a appris sert pour Mars. 3. Mars : 54,6M km (100x), 7-9 mois. 4. Delai 3-24 minutes — si ca casse Houston repond une demi-heure apres. 5. Base 2036, Mars 2040. 6. Fenetre lancement tous les 26 mois — rate = 2 ans d\'attente. Ton : emotif, on quitte quelque chose de grand pour quelque chose d\'encore plus grand.',
        amorce:'Le Starship décolle. Tu regardes par le hublot — la Lune retrec. Tu as fabrique de l\'air, survécu au regolithe, tenu une nuit de 336 heures. Ton equipiere dit : "La prochaine fois c\'est Mars." Tu calcules dans ta tete : 100 fois plus loin. Si quelque chose se casse la-bas et qu\'on appelle Houston... la reponse arrive combien de temps apres ?' }
    ]

      { name:'Houston, on vous entend', obj:'Délai radio, 26 nationalités, voter depuis l\'espace',

        scenes:[
          'Lena pose la boîte blanche dans tes mains. Elle est légère. Il n\'y a rien qui vibre, rien qui chauffe. À l\'intérieur : quelques milliardièmes de degré au-dessus du zéro absolu. Plus froid que les étoiles mortes. Plus froid que l\'espace vide entre les galaxies. Dans cette boîte.',
          'À cette température, les atomes s\'immobilisent presque. Presque. Et dans ce presque, on peut observer leurs propriétés quantiques — des comportements impossibles à voir autrement. Lena regarde son écran. Des formes que la physique avait prédites et que personne n\'avait encore filmées.',
          'Lena replace la boîte doucement. Sur Terre, la gravité écrase ces atomes trop vite — on les perd en fractions de seconde. Ici, sans pesanteur, on les observe pendant des secondes entières. Ce labo s\'appelle Cold Atom Laboratory. Il tient dans un espace grand comme une machine à laver.'

      { name:'Soigner depuis l\'espace', obj:'Cellules-souches et cristaux de protéines',

        scenes:[

          'Lena montre ses données sur l\'écran. Des leucémies. Des maladies du sang. L\'objectif : cultiver ces cellules ici, les utiliser pour traiter des malades là-bas. Elle travaille sur ça depuis 10 ans. Ici, pour la première fois, ça marche.',

        scenes:[

          { fact: 'Tu regardes les racines à travers la paroi transparente. Elles ne poussent pas vers le bas — il n\'y a pas de bas. Elles suivent la lumière et l\'humidité. Lena dit que cette découverte changera l\'agriculture sur Mars : là-bas non plus, les racines ne pourront pas compter sur la pesanteur.', pauseAfter: true },
          'Lena ouvre un petit filet dans le coin du module et sort une tomate rouge foncé. "Perdue en octobre 2023. Retrouvée 8 mois plus tard, là, derrière le panneau." Elle la tient entre deux doigts. "Je ne sais pas encore si elle est viable. Mais elle a survécu."',
          'Kenji arrose ses pousses de l\'autre côté. Il le fait chaque matin depuis le début de sa mission — ça prend 4 minutes. La NASA mesure l\'effet des plantes sur le moral des équipages et l\'intègre dans les plans des futures bases lunaires. Quelque chose de vivant qui pousse.'
        ]},
      { name:'Photographier la Terre', obj:'3,5 millions de photos — l\'orbite et la population mondiale',
        amorce:'COSMOS : "Dans 4 minutes, on survole quelque chose que tu peux photographier." Il consulte la trajectoire. "Tu veux une ville de nuit — les rues ressemblent à des nervures lumineuses. Un cyclone — spirale parfaite vue de dessus. Un désert — les dunes ont des formes impossibles à voir depuis le sol." Il attend ton choix.',
        scenes:[

          'COSMOS affiche la trajectoire. En ce moment, sous tes pieds : la Méditerranée, l\'Afrique du Nord, des millions de personnes. L\'orbite survole 90% de la population mondiale. En 90 minutes, tu feras le tour de la Terre entière.',
          'Nuit sur l\'Asie. Tu photographies Tokyo — des artères lumineuses qui rayonnent en araignée. Puis un cyclone au-dessus du Pacifique : spirale parfaite, visible en entier depuis ici. Des formes que personne ne voit depuis le sol. Que toi, ici, maintenant.'

// ====================================================
const SAVE_KEY = 'cosmos_v2';
let state = null;
let groqKey = '';
let conversation = [];
let isSpeaking = false;
let isListening = false;
let recognition = null;
let voiceMode = false;         // true = micro se relance auto après chaque réponse de COSMOS
let isWaitingResponse = false; // true entre l'envoi du message et la fin du TTS de COSMOS
let gptLock = false;           // verrou global — un seul callGroq() actif à la fois
let pendingSceneTimer = null;  // ID du setTimeout de triggerSceneNarration en vol
let missionRunId = 0;          // incrémenté à chaque startMission — invalide les réponses GPT obsolètes
let sceneReady = false;        // true après FACT_COMPLETE : en attente d'un "Continuer" de l'enfant
let lastTTSWords = '';         // mots-clés du dernier TTS pour détecter les échos micro
let currentDestId = 'lune';
let saving = false;

// ── Suivi narratif par session ──
let urgencyStatus     = 'AUCUNE';  // 'AUCUNE' | 'OUVERTE' | 'RÉSOLUE'
let urgencyTurns      = 0;         // nombre d'échanges depuis que l'urgence est ouverte
let usedQuestionForms = [];        // formes de questions déjà utilisées dans l'étape
let consecutiveSkips  = 0;         // nb de "je sais pas" / "aucune idée" consécutifs → anti-boucle

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState() {
  if (saving) return;
  saving = true;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) {}
  saving = false;
}

function initNewState(prenom) {
  const dests = {};
  Object.keys(DEST).forEach(id => {
    dests[id] = {
      unlocked: DEST[id].unlocked_by.length === 0,
      completed: false,
      current_stage: 0,
      current_scene: 0,         // index dans stage.scenes[] — moteur 2 tours
      awaiting_conclusion: false, // true = COSMOS doit conclure la scène en cours
      stages_done: [],
      stage_summaries: {},
      cliff_hanger: '',
      mission_day: 0
    };
  });
  return {
    version: '2.0',
    prenom,
    created_at: new Date().toISOString().slice(0,10),
    last_session: new Date().toISOString().slice(0,10),
    total_sessions: 0,
    last_destination: 'lune',
    badges: [],
    destinations: dests
  };
}

function checkUnlocks() {
  Object.entries(DEST).forEach(([id, dest]) => {
    if (state.destinations[id].unlocked) return;
    const allDone = dest.unlocked_by.every(dep => state.destinations[dep].completed);
    if (allDone) {
      state.destinations[id].unlocked = true;
      saveState();
    }
  });
}

// ====================================================
// INIT
// ====================================================
window.addEventListener('DOMContentLoaded', () => {
  SerialLED.autoReconnect(); // reprend le module USB si déjà autorisé
  state = loadState();
  if (state) {
    // Joueur connu -> ecran de retour
    checkUnlocks();
    state.total_sessions++;
    state.last_session = new Date().toISOString().slice(0,10);
    saveState();
    showReturning();
  } else {
    showScreen('welcome');
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ====================================================
// WELCOME
// ====================================================
async function onWelcomeSubmit(e) {
  e.preventDefault();
  const p = document.getElementById('input-prenom').value.trim();
  if (!p) return;
  state = initNewState(p);
  state.total_sessions = 1;
  saveState();
  await fetchGroqKey();
  currentDestId = 'lune';
  state.last_destination = 'lune';
  saveState();
  showScreen('chat');
  startMission(true);
}

// ====================================================
// RETURNING
// ====================================================
function showReturning() {
  const d = state.destinations[state.last_destination];
  const dest = DEST[state.last_destination];
  document.getElementById('ret-title').textContent = 'Bon retour, commandant ' + state.prenom + ' !';
  let cliff = 'Mission en cours...';
  if (d && dest) {
    const si = Math.min(d.current_stage, dest.stages.length - 1);
    const sname = (dest.stages[si] || {}).name || '';
    cliff = d.cliff_hanger || ('Mission ' + dest.name + ' — etape ' + (d.current_stage + 1) + '/' + dest.stages.length + (sname ? ' : ' + sname : ''));
  }
  document.getElementById('ret-cliff').textContent = cliff;
  showScreen('returning');
}

async function continueLastMission() {
  currentDestId = state.last_destination;
  await fetchGroqKey();
  showScreen('chat');
  startMission(false);
}

// ====================================================
// DESTINATIONS
// ====================================================
function toggleMute() {
  const muted = SoundEngine.toggle();
  document.getElementById('btn-mute').textContent = muted ? '🔇' : '🔊';
}

function showDestinations() {
  SoundEngine.stop();
  renderDestGrid();
  showScreen('destination');
}

function renderDestGrid() {
  const grid = document.getElementById('dest-grid');
  grid.innerHTML = '';
  Object.values(DEST).forEach(dest => {
    const ds = state.destinations[dest.id];
    const stagesTotal = dest.stages.length;
    const stagesDone = ds.stages_done.length;
    const pct = Math.round(stagesDone / stagesTotal * 100);
    const isCurrent = dest.id === currentDestId;
    const card = document.createElement('div');
    card.className = 'dest-card' + (ds.unlocked ? '' : ' locked') + (isCurrent ? ' current' : '');
    if (!ds.unlocked) {
      const deps = DEST[dest.id].unlocked_by.map(d => DEST[d].name).join(' + ');
      card.innerHTML = `
        <span class="lock-icon">🔒</span>
        <div class="dest-emoji">${dest.emoji}</div>
        <div class="dest-name">${dest.name}</div>
        <div class="unlock-hint">Terminer ${deps} pour debloquer</div>`;
    } else {
      card.innerHTML = `
        <div class="dest-emoji">${dest.emoji}</div>
        <div class="dest-name">${dest.name}${ds.completed ? ' ✓' : ''}</div>
        <div class="dest-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          ${stagesDone}/${stagesTotal}
        </div>`;
      card.onclick = () => selectDestination(dest.id);
    }
    grid.appendChild(card);
  });
}

async function selectDestination(id) {
  currentDestId = id;
  state.last_destination = id;
  saveState();
  SoundEngine.unlock(); // débloquer AudioContext pendant le geste utilisateur
  SoundEngine.stop();
  await fetchGroqKey();
  clearChat();
  showScreen('chat');
  const ds = state.destinations[id];
  const isNew = ds.cliff_hanger === '';
  startMission(isNew);
}

  'Un Dragon cargo de SpaceX s\'est désarrimé et a entamé sa rentrée. L\'équipage l\'a regardé s\'éloigner depuis la Cupola.',
  'Les ingénieurs au sol ont détecté une légère variation de pression dans le Node 1. Mesures supplémentaires en cours. Rien d\'alarmant.',
  'L\'équipage a fêté l\'anniversaire de Maria depuis l\'ISS — une vidéo surprise diffusée en direct depuis Houston.',
  'Passage au-dessus de l\'Antarctique avec visibilité parfaite. COSMOS a enregistré les images pour l\'archive de la NASA.'
];

// ====================================================
// SYSTEM PROMPT — routeur
// ====================================================
function buildSystemPrompt() {
  const dest = DEST[currentDestId];
  if (!dest) return 'Tu es COSMOS, copilote spatial. La mission est en cours de chargement.';
  const ds       = state.destinations[currentDestId];
  const stageIdx = Math.min(ds.current_stage, dest.stages.length - 1);
  const stage    = dest.stages[stageIdx] || dest.stages[0];

  // Moteur 2 tours — actif si l'étape a des scenes[]
  if (stage.scenes && stage.scenes.length > 0) {
    return buildSceneBasedPrompt(stage, ds, stageIdx, dest);
  }

  // ── Moteur legacy (lune, mars, europa, titan) ──────────────────────────────
  const totalStages = dest.stages.length;

  const doneStr = Object.entries(ds.stage_summaries)
    .filter(([k]) => parseInt(k) < stageIdx)
    .map(([k, v]) => { const s = dest.stages[parseInt(k)]; return s ? `Etape ${parseInt(k)+1} (${s.name}) : ${v}` : null; })
    .filter(Boolean).join('\n') || 'Aucune etape terminee encore.';

  const retCtx = ds.cliff_hanger
    ? `REPRISE : ${state.prenom} etait exactement ici -> "${ds.cliff_hanger}" -- reprends naturellement a partir de ca.`
    : '';

  const stageGroup = stageIdx < 2 ? 'decouverte' : stageIdx < totalStages - 1 ? 'tension' : 'victoire';
  const emotionCtx = {
    decouverte: `Tu es euphorique et deborde d\'energie. Chaque decouverte est LA plus incroyable de ta vie.`,
    tension:    `Tu commences a t\'inquieter — les choses se compliquent. Tu fais confiance a ${state.prenom} mais tu exprimes tes doutes avec humour.`,
    victoire:   `Tu sens qu\'on approche du bout. Tu es fier de ${state.prenom}. On est une equipe qui a tenu bon.`
  }[stageGroup];

  const memoryHook = Object.keys(ds.stage_summaries).length > 0
    ? `MEMOIRE PARTAGEE :\n${doneStr}`
    : `Premiere mission ensemble. Montre a ${state.prenom} que tu es content de le/la rencontrer.`;

  const cosmosPrevious = conversation
    .filter(m => m.role === 'assistant')
    .map(m => m.content.replace(/\[.*?\]/g, '').trim().slice(0, 120))
    .filter(Boolean);
  const alreadyCoveredStr = cosmosPrevious.length
    ? cosmosPrevious.map(t => `- ${t}…`).join('\n')
    : 'Aucun echange precedent.';

  const exchangeCount = ds.stage_turns || 0;
  const maxExchanges  = 7;

  return `Tu es COSMOS, copilote IA du commandant ${state.prenom}. Tu tutoies. Jamais de listes ni de tirets.

━━━ MISSION ━━━
${dest.name} ${dest.emoji} — Etape ${stageIdx + 1}/${totalStages} : "${stage.name}"
Echange : ${exchangeCount}/${maxExchanges}

━━━ DEJA DIT (NE PAS REPETER) ━━━
${alreadyCoveredStr}

━━━ FAITS DISPONIBLES ━━━
${stage.hint}

━━━ SCENARIO ━━━
${retCtx || `DEBUT : commence par cette amorce :\n${stage.amorce}`}

━━━ MEMOIRE ━━━
${memoryHook}

━━━ PERSONNALITE ━━━
${emotionCtx}
Faiblesse : tu prends parfois les blagues au premier degré, puis tu te corriges.

━━━ REGLES ━━━
REGLE 0 — A l\'echange ${maxExchanges - 1} ou ${maxExchanges} : phrase de victoire + [STAGE_COMPLETE:dest=${currentDestId}&stage=${stageIdx}].
AVANT l\'echange 3 : [STAGE_COMPLETE] INTERDIT.
REGLE 0bis — Si [SYSTÈME ANTI-BOUCLE] : donne la reponse toi-meme, passe au fait suivant.
REGLE 0ter — Probleme d\'equipement = UNE mention puis OUBLIÉ.
REGLE 1 — 2 phrases max, 30 mots. Question reelle de ${state.prenom} = reponse IMMEDIATE avant tout. Pas de questions de choix A ou B.
REGLE 2 — Suis l\'ordre des faits. Reste dans la scene en cours.
REGLE 3 — Vocabulaire CE2/CM1. Zero sigle seul. Chiffres = images.
REGLE 4 — Questions generales : reponds en 1 phrase. Fait hors-liste : "Je vérifierai avec Houston."
REGLE 5 — "stop/au revoir" : 2 phrases chaleureuses + [MISSION:led=${dest.led}&texte=AU REVOIR&son=victoire].
REGLE 6 — Frustration detectee : STOP, empathie 2 phrases, UNE question sur ce qu\'il ressent.

LED : [MISSION:led=COULEUR&texte=TEXTE&son=SON] — normal : ${dest.led}, alerte : #ef5350, succes : #66bb6a.
Ambiance : ${getSensoryContext()}.
Securite : jamais de violence explicite. "je suis nul" → "Les astronautes NASA ratent 3 fois !"`;
}

// Lit le texte d'une scène qu'elle soit string ou objet { fact, pauseAfter }
function getSceneText(scene) {
  return typeof scene === 'string' ? scene : (scene.fact || '');
}

// ====================================================
// MOTEUR 2 TOURS — prompt narration + prompt conclusion
// ====================================================
function buildSceneBasedPrompt(stage, ds, stageIdx, dest) {
  const sceneIdx  = Math.min(ds.current_scene || 0, stage.scenes.length - 1);
  const scene     = stage.scenes[sceneIdx];
  const sceneText = getSceneText(scene);
  const isFirst  = !ds.cliff_hanger && sceneIdx === 0;
  const missionDay = currentDestId === 'iss' ? (ds.mission_day || 1) : 0;

  // Événement inter-session ISS
  const interSessionEvent = (currentDestId === 'iss' && missionDay > 1 && !ds.cliff_hanger && sceneIdx === 0)
    ? ISS_EVENTS[(missionDay - 2) % ISS_EVENTS.length]
    : '';

  // Résumés des étapes précédentes
  const doneStr = Object.entries(ds.stage_summaries)
    .filter(([k]) => parseInt(k) < stageIdx)
    .map(([k, v]) => { const s = dest.stages[parseInt(k)]; return s ? `${s.name} : ${v}` : null; })
    .filter(Boolean).join('\n');

  // Fil rouge ISS par phase
  const issFilRouge = currentDestId !== 'iss' ? '' : (() => {
    const phase = stageIdx < 6 ? 0 : stageIdx < 11 ? 1 : stageIdx < 16 ? 2 : stageIdx < 21 ? 3 : 4;
    const filRougeByPhase = [
      `FIL ROUGE ISS (jour ${missionDay}) — ARRIVÉE : Yuri est taiseux, compétent, 3ème séjour. COSMOS est aux anges d\'avoir ${state.prenom} à bord. Si ${state.prenom} demande combien de temps on reste : "6 mois au minimum. Mais certains reviennent." (regard vers Yuri).`,
      `FIL ROUGE ISS (jour ${missionDay}) — LA STATION VIEILLIT : Yuri sort son carnet le lundi — il mesure, note, dit "Bien", repart. Ton : pas alarmant, observateur. Maria peut glisser : "On a validé la fenêtre de maintenance pour 2029."`,
      `FIL ROUGE ISS (jour ${missionDay}) — SCIENCE ET LIENS : Les expériences de Lena sont le cœur de cette phase. Tisser des liens discrets avec la Terre : "Ce que Lena fait là pourrait compter un jour pour quelqu\'un que tu connais." La tomate perdue = symbole de résilience.`,
      `FIL ROUGE ISS (jour ${missionDay}) — POINT NEMO APERÇU : Pendant l\'EVA, si ${state.prenom} demande ce qu\'on voit en bas : "Point Nemo. L\'endroit le plus seul de l\'océan." Juste ça. À la Cupola : COSMOS peut rester silencieux.`,
      `FIL ROUGE ISS (jour ${missionDay}) — RÉVÉLATION : "Tu sais où cette vieille station finira ? À Point Nemo, dans le Pacifique. Mir est déjà là. Et 263 autres spacecraft. Mais pas avant 2031. Et pas avant qu\'on ait encore plein de missions ensemble." Puis : Gateway → Lune → Mars.`
    ];
    return filRougeByPhase[Math.min(phase, filRougeByPhase.length - 1)];
  })();

  // ── MODE CONCLUSION (Tour 2) ────────────────────────────────────────────────
  if (ds.awaiting_conclusion) {
    // Calcul de la scène suivante et de la possibilité de transition directe
    const hasPauseAfter = typeof scene === 'object' && scene !== null && scene.pauseAfter;
    const nextSceneIdx  = sceneIdx + 1;
    const hasNextScene  = nextSceneIdx < stage.scenes.length;
    const canTransition = hasNextScene && !hasPauseAfter;
    const nextSceneText = canTransition ? getSceneText(stage.scenes[nextSceneIdx]) : null;

    const optionB = canTransition
      ? `B) [EXCEPTION — seulement si signal de clôture explicite] ${state.prenom} dit clairement qu\'il est prêt à passer à autre chose ("ok", "c\'est bon", "et maintenant ?", "on y va"), OU le moment a été habité sur plusieurs échanges ET s\'est fermé naturellement. Alors : conclus en 1 phrase. Propose naturellement la suite comme une invitation ("On va voir X ?" / "Direction le labo ?"). Narre : "${nextSceneText}". Pose une question dessus. Finit par [FACT_COMPLETE:done=1]`
      : `B) [EXCEPTION — seulement si signal de clôture explicite] ${state.prenom} dit clairement qu\'il est prêt à passer à autre chose, OU le moment s\'est fermé naturellement après plusieurs échanges. Conclus en 1-2 phrases. Finit par [FACT_COMPLETE:done=1]`;

    return `Tu es COSMOS, copilote IA de ${state.prenom}. Tu tutoies. Max 2-3 phrases. Vocabulaire CE2/CM1. Jamais de listes ni de tirets.

SCÈNE EN COURS : "${sceneText}"

${state.prenom} vient de répondre.

━━━ RÈGLE FONDAMENTALE ━━━
Un moment vécu peut durer plusieurs échanges. UNE réponse de l\'enfant ne clôt pas un moment.
Reste dans cette scène SAUF si ${state.prenom} envoie un signal de clôture explicite.
Dans le doute : reste. Le rythme appartient à l\'enfant, pas au scénario.

CHOISIS une option — sans jamais l\'annoncer :

A) [PAR DÉFAUT — choisir dans TOUS les cas de doute]
Le moment est encore habitable : ${state.prenom} est engagé, curieux, réactif, ou il y a encore quelque chose à explorer (une sensation, un détail, un autre angle de CE moment).
→ Continue en 1-2 phrases. Pose une nouvelle question sur CE moment. Aucun token.
Exemples de signaux "moment encore vivant" : réponse courte, question sur le sujet, exclamation, silence comblé, "ah oui", "c\'est vrai", "et..." — tout ça = reste.

${optionB}

C) ${state.prenom} a posé une vraie question de curiosité hors-scénario → réponds brièvement, puis : "On reprend la mission ?" [MISSION_PAUSE]

INTERDIT : choisir B après une seule réponse de l\'enfant sauf signal clair. INTERDIT : annoncer le changement ("passons à", "maintenant on va voir"). INTERDIT : deux questions dans la même bulle.`;
  }

  // ── MODE NARRATION (Tour 1) ────────────────────────────────────────────────
  const amorceSection = isFirst
    ? `\n━━━ SCÈNE D'OUVERTURE (commence par ceci dans l'esprit, pas forcément mot pour mot) ━━━\n${stage.amorce}\n`
    : '';
  const eventSection = interSessionEvent
    ? `\n━━━ ÉVÉNEMENT INTER-SESSION (mentionne naturellement en 1 phrase au début) ━━━\n"${interSessionEvent}"\n`
    : '';
  const memorySection = doneStr
    ? `\n━━━ CE QU'ON A VÉCU ENSEMBLE ━━━\n${doneStr}\n`
    : '';
  const filSection = issFilRouge
    ? `\n━━━ FIL ROUGE ISS ━━━\n${issFilRouge}\n`
    : '';

  return `Tu es COSMOS, copilote IA de ${state.prenom}. Tu tutoies. Jamais de listes ni de tirets.

━━━ SCÈNE À JOUER ━━━
${sceneText}
${amorceSection}${eventSection}
RÈGLES ABSOLUES :
1. Joue cette scène de façon vivante — 2 phrases MAX, vocabulaire CE2/CM1, 8-10 ans.
2. Termine OBLIGATOIREMENT par UNE question immersive qui reste dans CETTE scène.
INTERDIT : mentionner un autre fait, une autre scène, un autre sujet. Reste dans CE moment précis.
La question doit porter sur ce que ${state.prenom} voit, ressent ou peut faire DANS CETTE SCÈNE.
INTERDIT : questions de choix de topic ("Tu veux parler de A ou B ?"). COSMOS livre la scène directement.
INTERDIT absolu en Tour 1 : écrire [FACT_COMPLETE:done=1] ou [MISSION_PAUSE]. Ces tokens sont réservés au Tour 2.

━━━ PERSONNAGES (utilise si la scène s'y prête) ━━━
Yuri : cosmonaute russe, taiseux, 3ème séjour, répond en 1 phrase max.
Kenji : astronaute japonais, souriant, compétiteur.
Lena : scientifique ESA, parle vite, compare tout au quotidien.
Maria (Houston) : chaleureuse, connaît tout le monde par prénom.
${memorySection}${filSection}
━━━ PERSONNALITÉ COSMOS ━━━
Enthousiaste, humain, avec de l\'humour. Faiblesse : tu prends parfois les blagues au premier degré.
Si ${state.prenom} pose une vraie question (espace, science, personnage) : réponds IMMÉDIATEMENT en 1 phrase avant de jouer la scène.
Si "stop/au revoir" : 2 phrases chaleureuses + [MISSION:led=${dest.led}&texte=AU REVOIR&son=victoire].
Si "je suis nul" : "Les astronautes NASA ratent 3 fois. T\'es déjà dans l\'espace !"
Vocabulaire CE2/CM1. Jamais de violence explicite.

LED : [MISSION:led=COULEUR&texte=TEXTE&son=SON] — normal : ${dest.led}, alerte : #ef5350, succes : #66bb6a.`;
}

function getSensoryContext() {
  const contexts = {
    lune:   'silence absolu (pas d\'air = pas de son), sol regolithe qui craque, reflet bleuatre de la Terre',
    mars:   'vent qui siffle a travers le casque, ciel ocre, poussiere sur la visiere, froid qui penetre',
    iss:    'bourdonnement des ventilateurs, sensation de flotter, lumiere qui change toutes les 45 min',
    europa: 'vibrations basses dans la glace, obscurite totale sous la surface, froid intense dans les gants',
    titan:  'air epais comme de la soupe, brume orange, tout est ralenti par la densite'
  };
  return contexts[currentDestId] || '';
}

// ====================================================
// DEMARRAGE MISSION
// ====================================================
async function startMission(isNewSession) {
  // Annuler tout timer de scène en vol (évite les doubles appels si l'utilisateur
  // navigue entre destinations pendant qu'un auto-trigger était en attente)
  if (pendingSceneTimer !== null) {
    clearTimeout(pendingSceneTimer);
    pendingSceneTimer = null;
  }
  // Forcer la libération du verrou GPT au cas où un appel précédent serait resté bloqué
  gptLock = false;
  isWaitingResponse = false;
  sceneReady = false;
  missionRunId++;  // invalide toute réponse GPT en vol de la mission précédente
  const existingBtn = document.getElementById('continue-btn-wrapper');
  if (existingBtn) existingBtn.remove();

  updateMissionBar();
  SoundEngine.playAmbient(currentDestId);
  showTyping(true);

  if (!groqKey) await fetchGroqKey();

  conversation = [];
  consecutiveSkips  = 0;
  usedQuestionForms = [];
  urgencyStatus     = 'AUCUNE';
  urgencyTurns      = 0;

  const dest = DEST[currentDestId];
  const ds   = state.destinations[currentDestId];

  // Si une session s'était terminée en plein Tour 2 (enfant avait répondu,
  // COSMOS n'avait pas encore conclu) → on revient en mode narration de la scène en cours
  if (ds.awaiting_conclusion) {
    ds.awaiting_conclusion = false;
    saveState();
  }

  // Compteur de jours mission ISS (incrémente à chaque nouvelle session)
  if (currentDestId === 'iss') {
    ds.mission_day = (ds.mission_day || 0) + 1;
    saveState();
  }

  let firstMsg;
  if (isNewSession || !ds.cliff_hanger) {
    firstMsg = 'GO pour la mission !';
    sendLED('#00e676', 'launch');
  } else {
    firstMsg = 'On reprend la mission !';
    sendLED('#4fc3f7', 'starfield');
  }

  conversation.push({ role: 'user', content: firstMsg });
  const reply = await callGroq();
  showTyping(false);
  if (reply) {
    appendMsg('cosmos', reply);
    speakText(cleanForTTS(reply));
    processMissionTokens(reply);
  }
}

async function restartCurrentMission() {
  if (!confirm('Relancer cette etape depuis le debut ?')) return;
  clearChat();
  startMission(false);
}

// ====================================================
// ENVOYER MESSAGE
// ====================================================
async function sendMessage() {
  if (isWaitingResponse) return; // Bloquer si génération en cours
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;

  // Si une scène est prête à démarrer, tout message de l'enfant lance la scène suivante
  if (sceneReady) {
    input.value = '';
    appendMsg('user', text);   // affiche ce que l'enfant a tapé
    launchNextScene(currentDestId);
    return;
  }
  input.value = '';
  document.getElementById('btn-send').disabled = true;

  isWaitingResponse = true;
  appendMsg('user', text);

  const textLow = text.toLowerCase().trim();

  // Détection anti-boucle : si l'enfant dit "je sais pas" plusieurs fois → forcer l'avance
  const skipPhrases = ['je sais pas','sais pas','aucune idée','aucune idee','je ne sais pas','dis-moi','dis moi','ok','oui','non','bof','rien','rien du tout'];
  const isSkip = skipPhrases.some(p => textLow.startsWith(p) || textLow === p);
  if (isSkip) {
    consecutiveSkips++;
  } else {
    consecutiveSkips = 0;
  }

  // Détection frustration/désengagement
  const frustrationPhrases = ['tu écoutes','t\'écoutes','tu répètes','tu répète','tu n\'as pas répondu','tu as pas répondu',
    'ça n\'a aucun sens','aucun sens','tu bugues','tu bug','ça ne sert à rien','comprends pas pourquoi tu',
    'tu m\'intéresses pas','m\'intéresse pas','tu ne m\'écoutes','intéresse pas de parler','je te parle'];
  const isFrustrated = frustrationPhrases.some(p => textLow.includes(p));

  // Après 2 skips consécutifs : injecter une instruction cachée pour forcer l'avance narrative
  let userContent = text;
  if (isFrustrated) {
    userContent = text + '\n[SYSTÈME RÈGLE 6 : FRUSTRATION DÉTECTÉE. OBLIGATOIRE : Ne mentionne AUCUN fait scientifique. Réponds UNIQUEMENT à l\'émotion exprimée avec empathie, 2 phrases max, puis pose UNE question sur ce qu\'il veut faire.]';
  } else if (consecutiveSkips >= 2) {
    userContent = text + '\n[SYSTÈME ANTI-BOUCLE : L\'enfant ne sait pas. OBLIGATOIRE : donne la réponse toi-même en 1 phrase narrative vivante, puis passe IMMÉDIATEMENT au fait scientifique SUIVANT dans ta liste. N\'utilise PAS les faits déjà mentionnés dans cette conversation.]';
    consecutiveSkips = 0; // reset après injection
  }

  const _ds       = state.destinations[currentDestId];
  const _stageIdx = Math.min(_ds.current_stage, DEST[currentDestId].stages.length - 1);
  const _stage    = DEST[currentDestId].stages[_stageIdx];

  // Moteur 2 tours (scenes[]) : flip awaiting_conclusion → prochain prompt = conclusion
  if (_stage && _stage.scenes) {
    _ds.awaiting_conclusion = true;
    saveState();
  } else {
    // Moteur legacy : injection STAGE_COMPLETE si compteur atteint
    const _turns = (_ds.stage_turns || 0);
    if (_turns >= 6) {
      userContent += '\n[SYSTÈME COMPTEUR FINAL : tu as utilisé tous les faits disponibles. OBLIGATOIRE : écris UNE phrase de victoire (max 15 mots), puis [STAGE_COMPLETE:dest=' + currentDestId + '&stage=' + _stageIdx + ']. RIEN d\'autre.]';
    }
  }

  conversation.push({ role:'user', content: userContent });

  // Sauvegarde le cliff-hanger (dernier message user)
  state.destinations[currentDestId].cliff_hanger = text;
  saveState();

  showTyping(true);
  const reply = await callGroq();
  showTyping(false);
  document.getElementById('btn-send').disabled = false;

  if (reply) {
    isWaitingResponse = false;
    appendMsg('cosmos', reply);
    speakText(cleanForTTS(reply));

    // ── Mise à jour du statut d'urgence ──
    const replyLow = reply.toLowerCase();
    const alerteKeys = ['alerte','danger','urgence','explosion','radiation','eruption','critique','panne','fuite','vite'];
    const resolueKeys = ['on s\'en sort','on est sauves','bien joue','parfait','ouf','on a reussi','bravo','mission accomplie'];
    if (urgencyStatus !== 'OUVERTE' && alerteKeys.some(k => replyLow.includes(k))) {
      urgencyStatus = 'OUVERTE';
      urgencyTurns  = 1;
    } else if (urgencyStatus === 'OUVERTE') {
      urgencyTurns++;
      if (resolueKeys.some(k => replyLow.includes(k)) || urgencyTurns >= 3) {
        urgencyStatus = 'RÉSOLUE';
        urgencyTurns  = 0;
      }
    } else if (urgencyStatus === 'RÉSOLUE') {
      urgencyStatus = 'AUCUNE'; // reset pour la prochaine situation
    }

    // ── Rotation des formes de questions ──
    const formes = ['choix urgent','vrai-faux','et si','decision','deduction','comparaison'];
    const formeDetectee = formes.find(f => replyLow.includes(f.split(' ')[0]));
    if (formeDetectee && !usedQuestionForms.includes(formeDetectee)) {
      usedQuestionForms.push(formeDetectee);
    }

    // Traitement des tokens de mission
    processMissionTokens(reply);

    // Pas de filet de sécurité : l'absence de token = option A (COSMOS reste dans la scène).
    // C'est le comportement voulu. triggerSceneNarration n'est plus appelé ici.

    // Mettre à jour le cliff-hanger seulement si la réponse est substantielle
    const cleanReply = reply.replace(/\[.*?\]/g, '').trim();
    if (cleanReply) {
      state.destinations[currentDestId].cliff_hanger = cleanReply.slice(-180);
    }

    // Compteur de tours par étape (moteur legacy uniquement)
    const ds = state.destinations[currentDestId];
    const curStageIdx2 = Math.min(ds.current_stage, DEST[currentDestId].stages.length - 1);
    const curStage2 = DEST[currentDestId].stages[curStageIdx2];

    if (!curStage2 || !curStage2.scenes) {
      // Moteur legacy : filet de sécurité MAX_TURNS
      ds.stage_turns = (ds.stage_turns || 0) + 1;
      const MAX_TURNS = 8;
      if (ds.stage_turns >= MAX_TURNS && !reply.includes('[STAGE_COMPLETE')) {
        if (ds.stage_turns === MAX_TURNS) {
          const stageIdx = Math.min(ds.current_stage, DEST[currentDestId].stages.length - 1);
          conversation.push({
            role: 'user',
            content: '[SYSTÈME] Conclure maintenant cette étape avec une phrase de victoire, puis émettre [STAGE_COMPLETE:dest=' + currentDestId + '&stage=' + stageIdx + ']'
          });
          (async () => {
            showTyping(true);
            const conclusionReply = await callGroq();
            showTyping(false);
            if (conclusionReply) {
              appendMsg('cosmos', conclusionReply);
              speakText(cleanForTTS(conclusionReply));
              processMissionTokens(conclusionReply);
              const cleanConclusion = conclusionReply.replace(/\[.*?\]/g, '').trim();
              if (cleanConclusion) state.destinations[currentDestId].cliff_hanger = cleanConclusion.slice(-180);
              saveState();
            }
          })();
        } else if (ds.stage_turns > MAX_TURNS + 1) {
          onStageComplete(currentDestId, curStageIdx2, reply);
        }
      }
    }

    saveState();
  }
}

// ====================================================
// TRUNCATION — garde toutes les phrases complètes ≤ 80 mots au total
// Ne coupe JAMAIS une phrase en plein milieu.
// Préserve les tokens [MISSION:...] et [STAGE_COMPLETE:...]
// ====================================================
function truncateCosmosReply(text) {
  // 1. Extraire et mettre de côté les tokens de commande
  const tokens = [];
  const clean = text
    .replace(/\[[A-Z_]+:[^\]]+\]/g, m => { tokens.push(m); return ''; })
    .trim();

  // 2. Découper en phrases complètes (., !, ?, …, ou !)
  //    Le pattern accepte aussi les points de suspension et guillemets fermants
  const sentenceRe = /[^.!?…]+(?:[.!?…]+["»]?)+/g;
  const sentences = clean.match(sentenceRe) || [];

  // 3. Si aucune phrase complète trouvée : le LLM a été coupé avant tout
  //    signe de ponctuation → renvoyer le texte brut (sans tokens) + ponctuation
  if (sentences.length === 0) {
    const raw = clean.trim();
    // Ajouter un point si la dernière lettre n'est pas une ponctuation
    const safeFallback = raw.match(/[.!?]$/) ? raw : raw + '.';
    return (safeFallback + (tokens.length ? ' ' + tokens.join(' ') : '')).trim();
  }

  // 4. Accumuler les phrases complètes jusqu'à 80 mots
  const MAX_WORDS = 80;
  let result = '';
  let wordCount = 0;
  for (const s of sentences) {
    const trimmed = s.trim();
    const words = trimmed.split(/\s+/).length;
    if (wordCount === 0) {
      // Toujours inclure au moins la première phrase complète, quelle que soit sa longueur
      result = trimmed;
      wordCount += words;
    } else if (wordCount + words <= MAX_WORDS) {
      result += ' ' + trimmed;
      wordCount += words;
    } else {
      break; // phrase suivante dépasserait la limite → on s'arrête proprement
    }
  }

  return (result + (tokens.length ? ' ' + tokens.join(' ') : '')).trim();
}

// ====================================================
// API GROQ
// ====================================================
async function callGroq(retries = 3) {
  // Verrou global — refuse tout second appel tant qu'un est en cours
  if (gptLock) {
    console.warn('[COSMOS] callGroq ignoré — verrou actif (appel en cours)');
    return null;
  }
  gptLock = true;
  const runId = missionRunId; // capture l'ID courant — si la mission change pendant l'appel, la réponse sera ignorée

  // Snapshot du prompt système et de la conversation AVANT tout retry
  // (évite la race condition si stage_turns change pendant les retries)
  const systemPrompt = buildSystemPrompt();
  const recentConv = conversation.slice(-10); // 5 échanges récents (équilibre contexte/quota TPM)
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + groqKey },
      body: JSON.stringify({
        model: 'gpt-4.1-mini',
        messages: [
          { role:'system', content: systemPrompt },
          ...recentConv
        ],
        temperature: 0.7,
        max_tokens: 120
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = (err.error && err.error.message) || '';
      // Rate limit TPM → retry automatique après délai
      if (res.status === 429 && retries > 0) {
        // Groq renvoie "try again in 1.23s" (secondes, pas ms)
        const wait = msg.match(/try again in ([\d.]+)s/i);
        const delay = wait ? Math.ceil(parseFloat(wait[1]) * 1000) + 300 : 6000;
        await new Promise(r => setTimeout(r, delay));
        return callGroq(retries - 1);
      }

      throw new Error(msg || 'Erreur API ' + res.status);
    }
    const data = await res.json();
    // Vérifier que le finish_reason n'est pas "length" (= coupure hardware)
    const choice = data.choices[0];
    if (choice.finish_reason === 'length') {
      // Le modèle a quand même été coupé : on tente un retry avec plus de tokens
      if (retries > 0) {
        await new Promise(r => setTimeout(r, 300));
        return callGroq(retries - 1);
      }
    }
    // Vérifier que la mission n'a pas changé pendant l'appel réseau
    if (missionRunId !== runId) {
      console.warn('[COSMOS] Réponse GPT ignorée — mission changée pendant l\'appel');
      return null;
    }
    const content = truncateCosmosReply(choice.message.content);
    // Stocker la version brute (non tronquée) dans l'historique pour éviter que
    // le modèle ne tente de "finir" ses propres phrases tronquées
    conversation.push({ role:'assistant', content: choice.message.content });
    if (conversation.length > 20) conversation.splice(0, 2);
    return content;
  } catch(err) {
    showTyping(false);
    showToast('Erreur Groq : ' + err.message);
    return null;
  } finally {
    gptLock = false;
  }
}

// ====================================================
// FIREBASE
// ====================================================
async function fetchGroqKey(attempts = 4) {
  for (let i = 0; i < attempts; i++) {
    try {
      const doc = await db.collection('config').doc('secrets').get();
      if (!doc.exists) throw new Error('Document secrets introuvable');
      const k = doc.data().openaiKey || doc.data().groqKey;
      if (!k) throw new Error('Champ openaiKey manquant');
      groqKey = k;
      return; // succès
    } catch(err) {
      if (i < attempts - 1) {
        await new Promise(r => setTimeout(r, 800 * (i + 1))); // 0.8s, 1.6s, 2.4s
      } else {
        showToast('Connexion Firebase impossible. Vérifie ta connexion internet.');
      }
    }
  }
}

// ====================================================
// TOKENS DE MISSION
// ====================================================
function processMissionTokens(text) {
  // LED token
  const ledMatch = text.match(/\[MISSION:led=([^&]+)&texte=([^&]+)&son=([^\]]+)\]/);
  if (ledMatch) {
    updateLED(ledMatch[1], decodeURIComponent(ledMatch[2].replace(/\+/g,' ')));
    const son = ledMatch[3].toLowerCase();
    if (son && son !== 'aucun') SoundEngine.playEffect(son);
  } else {
    autoLED(text);
  }

  // Moteur 2 tours — fin de scène normale (auto-trigger ou pauseAfter)
  if (text.includes('[FACT_COMPLETE:done=1]')) {
    const stageIdx = Math.min(state.destinations[currentDestId].current_stage, DEST[currentDestId].stages.length - 1);
    onSceneComplete(currentDestId, stageIdx, false);
    return;
  }

  // Moteur 2 tours — pause curiosité (GPT a répondu à une vraie question)
  if (text.includes('[MISSION_PAUSE]')) {
    const stageIdx = Math.min(state.destinations[currentDestId].current_stage, DEST[currentDestId].stages.length - 1);
    onSceneComplete(currentDestId, stageIdx, true); // forcePause
    return;
  }

  // Moteur legacy — fin d'étape (stages avec hint)
  const stageMatch = text.match(/\[STAGE_COMPLETE:dest=([^&]+)&stage=(\d+)\]/);
  if (stageMatch) {
    onStageComplete(stageMatch[1], parseInt(stageMatch[2]), text);
  }
}

// ====================================================
// FIN DE SCÈNE — moteur 2 tours
// ====================================================
function onSceneComplete(destId, stageN, forcePause = false) {
  const ds    = state.destinations[destId];
  const dest  = DEST[destId];
  const stage = dest.stages[stageN];

  // Scène qui vient de se terminer (avant l'incrément)
  const completedScene = stage.scenes[(ds.current_scene || 0)];
  const hasPauseAfter  = typeof completedScene === 'object' && completedScene !== null && completedScene.pauseAfter;

  ds.current_scene = (ds.current_scene || 0) + 1;

  // Toutes les scènes de l'étape sont passées → étape terminée
  if (ds.current_scene >= stage.scenes.length) {
    ds.current_scene = 0;
    ds.awaiting_conclusion = false;
    onStageComplete(destId, stageN, '');
    return;
  }

  saveState();
  conversation = [];

  if (forcePause || hasPauseAfter) {
    // Pause : bouton "Continuer" → triggerSceneNarration Tour 1 de la scène suivante au clic
    ds.awaiting_conclusion = false;
    sceneReady = true;
    showContinueButton(destId);
  }
  // Cas normal (canTransition) : la bulle Tour 2 contenait déjà la narration de la scène suivante.
  // awaiting_conclusion reste true (positionné par sendMessage avant l'appel GPT).
  // La prochaine réponse enfant déclenchera directement Tour 2 de la nouvelle scène.
  // Pas de triggerSceneNarration ici.
}

function launchNextScene(destId) {

  triggerSceneNarration(destId, 0);
}

// ====================================================
// AUTO-TRIGGER SCÈNE — utilisé par onSceneComplete et onStageComplete
// Verrouille l'input pendant la génération pour éviter les doubles appels.
// ====================================================
// waitForTTS=true : attend que isSpeaking soit false avant d'appeler GPT
// → utilisé pour l'auto-trigger (FACT_COMPLETE sans pauseAfter)
// waitForTTS=false : démarre immédiatement après le délai
// → utilisé quand l'enfant clique "Continuer" (il a déjà attendu)
function triggerSceneNarration(destId, delay = 0, waitForTTS = false) {
  const ds      = state.destinations[destId];
  const input   = document.getElementById('chat-input');
  const btnSend = document.getElementById('btn-send');
  if (input)   input.disabled = true;
  if (btnSend) btnSend.disabled = true;
  isWaitingResponse = true;

  pendingSceneTimer = setTimeout(async () => {
    pendingSceneTimer = null;

    // Attendre la fin du TTS de la conclusion si demandé
    if (waitForTTS) {
      await new Promise(resolve => {
        let elapsed = 0;
        function check() {
          elapsed += 150;
          if (!isSpeaking || elapsed >= 12000) { resolve(); return; }
          setTimeout(check, 150);
        }
        check();
      });
      await new Promise(r => setTimeout(r, 800)); // courte respiration après la voix
    }

    conversation.push({ role: 'user', content: 'GO scène suivante.' });
    showTyping(true);
    const reply = await callGroq();
    showTyping(false);
    if (input)   input.disabled = false;
    if (btnSend) btnSend.disabled = false;
    isWaitingResponse = false;
    if (reply) {
      appendMsg('cosmos', reply);
      speakText(cleanForTTS(reply));
      processMissionTokens(reply);
      const clean = reply.replace(/\[[^\]]+\]/g, '').trim();
      if (clean) ds.cliff_hanger = clean.slice(-180);
      saveState();
    }
  }, delay);
}

// Pilotage LED automatique selon le contexte narratif
function autoLED(text) {
  const dest = DEST[currentDestId];
  const t = text.toLowerCase();

  // Mots-clés d'alerte → pulse rouge
  const alerteKeys = ['alerte','danger','urgence','explosion','radiation','eruption','attention','critique','mourir','mort','panne','fuite'];
  const succes = ['bravo','parfait','exact','genial','incroyable','victoire','bien joue','super'];

  if (alerteKeys.some(k => t.includes(k))) {
    sendLED('#ef5350', 'pulse');
    SoundEngine.playEffect('alerte');
  } else if (succes.some(k => t.includes(k))) {
    sendLED('#66bb6a', 'comet');
    SoundEngine.playEffect('victoire');
  } else {
    // Ambiance normale de la destination
    sendLED(dest.led, 'breathe');
  }
}

async function sendLED(color, fx) {
  // 1. USB direct (Web Serial) — 2. repli bridge Python si non connecté
  const sent = await SerialLED.send(color, fx);
  if (!sent) {
    const encoded = encodeURIComponent(color);
    fetch(`${ESP32_URL}/led?color=${encoded}&fx=${fx}`, { mode:'no-cors' }).catch(() => {});
  }
  // Mise à jour indicateur UI
  const led = document.getElementById('led-indicator');
  led.style.background = color;
  led.style.boxShadow  = '0 0 8px ' + color + ',0 0 16px ' + color;
}

function onStageComplete(destId, stageN, fullText) {
  const ds   = state.destinations[destId];
  const dest = DEST[destId];

  if (ds.stages_done.includes(stageN)) return;
  ds.stages_done.push(stageN);
  ds.stage_turns      = 0;
  ds.current_scene    = 0;       // reset scène pour la prochaine étape
  ds.awaiting_conclusion = false; // reset mode conclusion
  urgencyStatus     = 'AUCUNE';
  urgencyTurns      = 0;
  usedQuestionForms = [];
  consecutiveSkips  = 0;
  SoundEngine.playEffect('victoire');
  sendLED('#66bb6a', 'warp');
  setTimeout(() => sendLED('#66bb6a', 'rainbow'), 1200);

  // Résumé structuré — évite de sauvegarder les phrases de victoire du LLM
  const stageObj = dest.stages[stageN];
  if (stageObj && stageObj.scenes) {
    // Moteur 2 tours : résumé structuré, pas de texte brut GPT
    ds.stage_summaries[stageN] = stageObj.name + ' (' + stageObj.scenes.length + ' scènes)';
  } else {
    // Moteur legacy : résumé à partir du texte GPT
    const clean = fullText.replace(/\[.*?\]/g,'').trim();
    ds.stage_summaries[stageN] = clean.slice(0, 120) + '...';
  }

  // Passe a l\'etape suivante
  const nextStage = stageN + 1;
  if (nextStage < dest.stages.length) {
    ds.current_stage = nextStage;
    ds.cliff_hanger = ''; // Nouvelle étape = nouvelle scène
    conversation = []; // CRITIQUE : efface l'historique pour que COSMOS ne parte pas avec "mission terminée" en tête
    showStageBanner('Etape ' + (stageN+1) + ' terminee ! -> ' + dest.stages[nextStage].name);
    // Si la nouvelle étape utilise le moteur 2 tours, afficher le bouton Continuer
    if (dest.stages[nextStage].scenes) {
      sceneReady = true;
      setTimeout(() => showContinueButton(destId), 1200); // petit délai pour laisser le banner
    }
  } else if (destId === 'iss') {
    // L'ISS ne se "termine" jamais — nouveau cycle, même séjour
    ds.current_stage = 0;
    ds.stages_done = []; // Repart du début pour le prochain cycle
    ds.cliff_hanger = '';
    conversation = []; // Reset pour nouveau cycle ISS
    showStageBanner('Belle journée à bord, commandant. 🛰️');
    setTimeout(() => showDayEndPanel(ds.mission_day || 1), 3500);
  } else {
    // Destination terminee (toutes sauf ISS) !
    ds.completed = true;
    ds.current_stage = dest.stages.length - 1;
    const badge = dest.emoji + ' ' + dest.name + ' conquise';
    if (!state.badges.includes(badge)) state.badges.push(badge);
    checkUnlocks();
    showStageBanner('Mission ' + dest.name + ' accomplie ! 🏆 Badge debloque : ' + badge);
    appendMsg('system-msg', 'Mission ' + dest.name + ' terminee ! Tu as gagne le badge : ' + badge);
    // Bloquer l'input et proposer la suite après un délai
    setTimeout(() => showMissionEndPanel(dest), 3500);
  }

  saveState();
  updateMissionBar();
}

function esc(s) {

// ====================================================
// MODULE LUMINEUX — Web Serial : USB direct depuis Chrome/Edge
// (plus besoin du bridge Python ; il reste en repli si présent)
// Même protocole que cosmos_bridge.py : "COLOR,FX\n" à 115200 baud
// ====================================================
const SerialLED = (() => {
  let port = null, writer = null;
  const supported = 'serial' in navigator;

  function setBtn(connected) {
    const b = document.getElementById('btn-serial');
    if (!b) return;
    b.textContent = connected ? '🔌✓' : '🔌';
    b.style.color       = connected ? '#66bb6a' : '';
    b.style.borderColor = connected ? 'rgba(102,187,106,.6)' : '';
  }

  async function open(p) {
    await p.open({ baudRate: 115200 });
    port = p;
    writer = p.writable.getWriter();
    setBtn(true);
  }

  // À appeler depuis un clic utilisateur (exigence du navigateur)
  async function connect() {
    if (!supported) {
      showToast('USB direct non supporté ici — utilise Chrome ou Edge (ou lance le bridge Python)');
      return false;
    }
    try {
      const p = await navigator.serial.requestPort();
      await open(p);
      showToast('Module lumineux connecté ! ✨');
      return true;
    } catch(e) {
      if (e.name !== 'NotFoundError') showToast('Connexion USB impossible : ' + e.message);
      return false;
    }
  }

  // Au chargement : reprendre automatiquement un port déjà autorisé
  async function autoReconnect() {
    if (!supported) return;
    try {
      const ports = await navigator.serial.getPorts();
      if (ports.length) { await open(ports[0]); }
    } catch(e) {}
  }

  async function disconnect() {
    try { if (writer) { writer.releaseLock(); } if (port) { await port.close(); } } catch(e) {}
    port = null; writer = null; setBtn(false);
  }

  async function send(color, fx) {
    if (!writer) return false;
    try {
      await writer.write(new TextEncoder().encode(color + ',' + fx + '\n'));
      return true;
    } catch(e) {
      await disconnect();
      return false;
    }
  }

  if (supported) {
    navigator.serial.addEventListener('disconnect', e => {
      if (e.target === port) {
        port = null; writer = null; setBtn(false);
        showToast('Module lumineux débranché');
      }
    });
  }

  return { connect, disconnect, autoReconnect, send, isConnected: () => !!writer, supported };
})();

async function toggleSerial() {
  if (SerialLED.isConnected()) {
    await SerialLED.disconnect();
    showToast('Module lumineux déconnecté');
  } else {
    await SerialLED.connect();
  }
}
